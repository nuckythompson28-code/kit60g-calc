<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KIT60G 3D 가공 시뮬레이션</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Malgun Gothic', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  overflow: hidden; height: 100vh;
}
#ui {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: 10px 14px; background: linear-gradient(180deg, rgba(26,26,46,0.97) 80%, rgba(26,26,46,0));
  pointer-events: none;
}
#ui > * { pointer-events: auto; }
h1 {
  font-size: 17px; color: #00d4ff; text-align: center;
  margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #333;
}

h1 a:hover { color: #00d4ff; }
.toolbar {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  justify-content: center; margin-bottom: 6px;
}
.toolbar label { font-size: 12px; color: #aaa; }
.toolbar input {
  width: 70px; padding: 5px 6px; border: 1px solid #444; border-radius: 5px;
  background: #0f3460; color: #fff; font-size: 13px; text-align: center;
}
.toolbar select {
  padding: 5px 6px; border: 1px solid #444; border-radius: 5px;
  background: #0f3460; color: #fff; font-size: 12px;
}
.btn {
  padding: 6px 14px; border: none; border-radius: 6px;
  font-size: 12px; font-weight: bold; cursor: pointer; color: #fff;
}
.btn-red { background: #e94560; }
.btn-red:active { background: #c73550; }
.btn-blue { background: #0984e3; }
.btn-blue:active { background: #0770c2; }
.btn-green { background: #00b894; }
.btn-green:active { background: #009975; }
.btn-gray { background: #636e72; }
.btn-gray:active { background: #4a5558; }
#status {
  text-align: center; font-size: 13px; color: #fdcb6e;
  min-height: 20px; padding: 4px 0;
}
#legend {
  display: flex; flex-wrap: wrap; gap: 6px 12px; justify-content: center;

}

#legend span b {
  display: inline-block; width: 10px; height: 10px; border-radius: 2px;
}
canvas { display: block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="ui">
  <h1>KIT60G 3D 가공 시뮬레이션 <a href="index.html">← 계산기</a></h1>
  <div class="toolbar">
    <label>소재길이</label>
    <input id="inMatLen" type="number" value="543" step="1" data-sync="matLen">
    <label>mm</label>
    <label>외경</label>
    <input id="inOD" type="number" value="16" step="0.1" style="width:50px">
    <label>내경</label>
    <input id="inID" type="number" value="0" step="0.1" style="width:50px">
    <label>mm</label>
    <button class="btn btn-red" onclick="rebuild()">재생성</button>
    <span style="width:8px"></span>
    <button class="btn btn-green" id="btnPlay" onclick="togglePlay()">▶ 재생</button>
    <button class="btn btn-gray" onclick="resetAnim()">↺ 리셋</button>
    <label>속도</label>
    <select id="selSpeed" onchange="updateSpeed()">
      <option value="1.2">느림</option>
      <option value="4" selected>보통</option>
      <option value="12">빠름</option>
      <option value="32">초고속</option>
    </select>
  </div>
  <div id="paramInfo" style="font-size:11px;color:#666;text-align:center;padding:2px 0"></div>
  <div id="status">재생 버튼을 눌러주세요</div>
  <div id="legend"></div>
</div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── Parameters (localStorage에서 로드, 없으면 기본값) ── */
const _saved = (() => {
  try { return JSON.parse(localStorage.getItem('kit60g_params')) || {}; } catch { return {}; }
})();
const P = {
  finLen:    _saved.finLen    ?? 8.0,
  tipWidth:  _saved.tipWidth  ?? 2.0,
  chuckInit: _saved.chuckInit ?? 75,
  safetyLen: _saved.safetyLen ?? 12,
  chuckLeft: _saved.chuckLeft ?? 15,
  chuck2jaw: _saved.chuck2jaw ?? 1.03,
  faceCut:   _saved.faceCut   ?? 1,
  margin:    _saved.margin    ?? 0.2,
  matType:   _saved.matType   ?? 3,
  matLen:    _saved.matLen    ?? 543,
  residual:  _saved.residual  ?? 0
};
const BAR_R = 8;
let curOuterR = BAR_R; // 현재 외경 반지름 (buildScene에서 갱신)

/* ── Calculation ── */
function calc(p, matLen) {
  const unitW    = p.finLen + p.tipWidth;
  const deadZone = p.chuckLeft + p.chuck2jaw + p.safetyLen;
  const pcsChuck = Math.floor((p.chuckInit - p.safetyLen) / unitW);
  if (pcsChuck < 1) return null;
  const machLen  = pcsChuck * unitW;
  const effMat   = matLen - ((p.matType === 2) ? 15 : 0);
  if (effMat <= machLen + p.safetyLen) return null;
  let autoPulls = Math.floor(
    (effMat - deadZone - machLen - p.tipWidth - p.faceCut)
    / (machLen + p.tipWidth + p.margin)
  );
  if (autoPulls < 0) autoPulls = 0;
  const consumed  = (machLen + p.tipWidth + p.faceCut)
                  + autoPulls * (machLen + p.tipWidth + p.margin);
  const remainRaw = effMat - consumed - deadZone - (p.tipWidth + p.margin);
  const remainPcs = Math.max(0, Math.floor(remainRaw / unitW));
  const scrap     = remainPcs > 0
                  ? Math.max(0, remainRaw - remainPcs * unitW)
                  : Math.max(0, remainRaw);
  const total     = pcsChuck * (1 + autoPulls) + remainPcs;
  return { total, autoPulls, remainPcs, scrap, pcsChuck, machLen, unitW, deadZone };
}

/* ── Colors (소재타입별 제품색) ── */
const MAT_COLORS = { 1: 0xf1c40f, 2: 0x74b9ff, 3: 0xdfe6e9 }; // 노랑, 스카이블루, 연회색
const productColor = MAT_COLORS[P.matType] || 0xdfe6e9;
const COL = {
  scrap:    0xd63031,
  jawGrip:  0x7c1a1a,
  safety:   0x3d0c0c,
  product:  productColor,
  residual: productColor,
  parting:  0xe17055,
  margin:   0xfdcb6e,
  sep:      0x636e72,
  faceCut:  0x6c5ce7,
  chuck:    0x8899aa,
  tool:     0xcccccc,
};

/* ── Three.js Setup ── */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.LinearToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.setClearColor(0x1a1a2e);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a1a2e, 600, 1200);
const camera = new THREE.PerspectiveCamera(45, 1, 1, 2000);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 30;
controls.maxDistance = 900;

/* Lighting */
const ambLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(100, 200, 150);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
fillLight.position.set(-80, 60, -100);
scene.add(fillLight);

/* Grid floor */
const gridHelper = new THREE.GridHelper(800, 40, 0x222244, 0x181830);
gridHelper.position.y = -20;
scene.add(gridHelper);

/* ── State ── */
let barGroup, chuckGroup, gangGroup;
let toolMesh, boringBarMesh, alGripperMesh; // gangGroup 내부 서브 참조
let segments = [];      // { mesh, type, zStart, len, cycle }
let animSteps = [];
let animIdx = 0, animT = 0, playing = false;
let initialBarZ = 0;   // 초기 barGroup.position.z (리셋용)
let initialChuckZ = 0; // 초기 chuckGroup.position.z (리셋용)
let gangRestZ = 0;      // 갱 툴포스트 초기 Z
let speedMul = 1;
let barSpinning = false;
let result = null;

/* ── Build Bar Segments ── */
function buildSegments(matLen) {
  result = calc(P, matLen);
  if (!result) { setStatus('계산 불가 – 소재 길이를 확인하세요'); return false; }
  segments = [];
  const r = result;
  let z = 0;
  const push = (len, type, cycle) => {
    if (len <= 0) return;
    segments.push({ zStart: z, len, type, cycle: cycle ?? -1 });
    z += len;
  };

  // From left: scrap → jawGrip → safety+chuck2jaw → [machining zone] → faceCut
  push(Math.max(0, r.scrap), 'scrap', -1);
  push(P.chuckLeft, 'jawGrip', -1);
  push(P.chuck2jaw + P.safetyLen, 'safety', -1);

  // Remaining pieces (residual) — 파팅(왼) → 제품(오) → 파팅 → 마진
  for (let i = 0; i < r.remainPcs; i++) {
    push(P.tipWidth, 'parting', -2);
    push(P.finLen, 'residual', -2);
  }
  if (r.remainPcs > 0) {
    push(P.tipWidth, 'parting', -2); // 마진 왼쪽 파팅
    push(P.margin, 'margin', -2);
  }

  // AL cycles (from last to first, since left = farther from face)
  for (let a = r.autoPulls; a >= 1; a--) {
    for (let i = 0; i < r.pcsChuck; i++) {
      push(P.tipWidth, 'parting', a);
      push(P.finLen, 'product', a);
    }
    push(P.tipWidth, 'parting', a); // 마진 왼쪽 파팅
    push(P.margin, 'margin', a);
  }

  // Initial chuck cycle — 파팅(왼) → 제품(오)
  for (let i = 0; i < r.pcsChuck; i++) {
    push(P.tipWidth, 'parting', 0);
    push(P.finLen, 'product', 0);
  }

  // 페이스컷 왼쪽 파팅 (페이스컷+파팅 동시 절단용)
  push(P.tipWidth, 'parting', 0);

  // Face cut
  push(P.faceCut, 'faceCut', 0);

  return true;
}

function buildScene(matLen) {
  // Clear old
  if (barGroup) scene.remove(barGroup);
  if (chuckGroup) scene.remove(chuckGroup);
  if (gangGroup) scene.remove(gangGroup);

  if (!buildSegments(matLen)) return;

  const totalLen = segments.reduce((s, seg) => s + seg.len, 0);

  /* Bar group — 외경/내경 반영 */
  barGroup = new THREE.Group();
  const outerR = parseFloat(document.getElementById('inOD').value) / 2 || BAR_R;
  const innerR = parseFloat(document.getElementById('inID').value) / 2 || 0;
  curOuterR = outerR;

  // 튜브 지오메트리 생성 (내경 > 0이면 중공)
  function makeTubeGeo(len, oR, iR) {
    if (iR > 0 && iR < oR) {
      // LatheGeometry로 단면 회전체 생성 (반원형 단면 → 튜브)
      const shape = new THREE.Shape();
      const halfL = len / 2;
      shape.moveTo(iR, -halfL);
      shape.lineTo(oR, -halfL);
      shape.lineTo(oR, halfL);
      shape.lineTo(iR, halfL);
      shape.lineTo(iR, -halfL);
      const geo = new THREE.LatheGeometry(
        shape.getPoints(1).map(p => new THREE.Vector2(p.x, p.y)), 32
      );
      return geo;
    }
    return new THREE.CylinderGeometry(oR, oR, len, 32);
  }

  segments.forEach((seg, i) => {
    const col = COL[seg.type] || 0xffffff;
    const mat = new THREE.MeshStandardMaterial({
      color: col, metalness: 0.05, roughness: 0.85,
    });
    const geo = makeTubeGeo(seg.len, outerR, innerR);
    const mesh = new THREE.Mesh(geo, mat);
    // Bar along Z: cylinder/lathe default is along Y, so rotate
    mesh.rotation.x = Math.PI / 2;
    mesh.position.z = seg.zStart + seg.len / 2;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    seg.mesh = mesh;
    barGroup.add(mesh);
  });

  // 사이클0 영역 길이 (척에서 돌출되는 부분)
  const cycle0Segs = segments.filter(s => s.cycle === 0);
  const stickoutLen = cycle0Segs.reduce((sum, s) => sum + s.len, 0);

  // 봉재 위치: 사이클0 영역만 척(z=0) 우측으로 돌출
  // bar-local totalLen → world stickoutLen (우측 끝)
  // bar-local (totalLen - stickoutLen) → world 0 (척 면)
  initialBarZ = -(totalLen - stickoutLen);
  barGroup.position.z = initialBarZ;
  scene.add(barGroup);

  /* Chuck — 고정 위치 z=0 */
  chuckGroup = new THREE.Group();
  const jawMat = new THREE.MeshStandardMaterial({ color: COL.chuck, metalness: 0.15, roughness: 0.75 });

  // Back plate (척 뒤판)
  const plateGeo = new THREE.CylinderGeometry(outerR * 2.5, outerR * 2.5, 8, 32);
  const plate = new THREE.Mesh(plateGeo, jawMat);
  plate.rotation.x = Math.PI / 2;
  plate.position.z = -6;
  plate.castShadow = true;
  chuckGroup.add(plate);

  // 3 Jaws (조)
  for (let i = 0; i < 3; i++) {
    const ang = (i * 2 * Math.PI) / 3;
    const jawGeo = new THREE.BoxGeometry(outerR * 0.7, outerR * 1.2, 20);
    const jaw = new THREE.Mesh(jawGeo, jawMat);
    jaw.position.set(Math.cos(ang) * (outerR + 3.5), Math.sin(ang) * (outerR + 3.5), 3);
    jaw.rotation.z = ang;
    jaw.castShadow = true;
    chuckGroup.add(jaw);
  }

  // Outer ring (척 외륜)
  const ringGeo = new THREE.TorusGeometry(outerR * 2.8, 2.5, 16, 32);
  const ring = new THREE.Mesh(ringGeo, jawMat);
  ring.position.z = -2;
  ring.castShadow = true;
  chuckGroup.add(ring);

  // 척 위치: 사이클0 첫 파팅 왼쪽 끝에서 #530+#532 만큼 왼쪽
  // 조의 우측 끝(jaw tip)이 그 위치에 오도록 배치
  const firstCycle0Part = segments.find(s => s.cycle === 0 && s.type === 'parting');
  const firstPartWorldZ = initialBarZ + (firstCycle0Part ? firstCycle0Part.zStart : 0);
  const jawTipLocalZ = 13; // jaw center z=3, half-length=10 → tip at z=13
  initialChuckZ = firstPartWorldZ - (P.safetyLen + P.chuck2jaw) - jawTipLocalZ;
  chuckGroup.position.z = initialChuckZ;
  scene.add(chuckGroup);

  /* ── 갱 툴포스트: T01+T02+T03 한 뭉탱이 ── */
  /* 갱타입 CNC: 모든 공구가 하나의 슬라이드에 장착, Y(반경)+Z(축) 동시 이동 */
  gangGroup = new THREE.Group();
  const TOOL_SP = outerR + 8; // 공구간 Y 간격
  const gangMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.2, roughness: 0.8 });

  // 베이스 플레이트 (툴포스트 본체)
  const basePlate = new THREE.Mesh(
    new THREE.BoxGeometry(8, TOOL_SP * 2 + 14, 28), gangMat
  );
  basePlate.position.set(0, TOOL_SP, 16);
  gangGroup.add(basePlate);

  /* T02 (절단바이트) — gangLocal Y=0, Z=0 */
  const tBlade = new THREE.Mesh(
    new THREE.BoxGeometry(P.tipWidth, outerR * 0.6, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.12, roughness: 0.85 })
  );
  tBlade.position.set(0, 0, 0);
  gangGroup.add(tBlade);
  toolMesh = tBlade; // 이펙트 참조용

  /* T01 (보링바) — gangLocal Y=TOOL_SP */
  const t01Sub = new THREE.Group();
  const bbMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.12, roughness: 0.85 });
  const bbH1 = new THREE.Mesh(new THREE.BoxGeometry(14, 14, 18), bbMat);
  bbH1.position.z = 16;
  t01Sub.add(bbH1);
  const bbH2 = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 8),
    new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.1, roughness: 0.85 }));
  bbH2.position.z = 4;
  t01Sub.add(bbH2);
  const bbBarLen = P.finLen + 3;
  const bbBar = new THREE.Mesh(
    new THREE.CylinderGeometry(2.5, 2.5, bbBarLen, 16),
    new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.15, roughness: 0.8 })
  );
  bbBar.rotation.x = Math.PI / 2;
  bbBar.position.z = -bbBarLen / 2;
  t01Sub.add(bbBar);
  const bbTip = new THREE.Mesh(
    new THREE.CylinderGeometry(1, 2.5, 3, 16),
    new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.15, roughness: 0.8 })
  );
  bbTip.rotation.x = Math.PI / 2;
  bbTip.position.z = -(bbBarLen + 1.5);
  t01Sub.add(bbTip);
  const bbTipOffset = bbBarLen + 1.5;
  t01Sub.position.set(0, TOOL_SP, 0);
  gangGroup.add(t01Sub);
  boringBarMesh = t01Sub;

  /* T03 (AL 그리퍼) — gangLocal Y=TOOL_SP*2 */
  const t03Sub = new THREE.Group();
  const alMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a, metalness: 0.1, roughness: 0.85 });
  const fingerMat = new THREE.MeshStandardMaterial({ color: 0x5a5a5a, metalness: 0.1, roughness: 0.8 });
  const armH = outerR * 2.5;
  const armLen = 8;
  const alBack = new THREE.Mesh(new THREE.BoxGeometry(5, armH, 4), alMat);
  alBack.position.set(0, 0, armLen / 2 + 2);
  t03Sub.add(alBack);
  const alArmTop = new THREE.Mesh(new THREE.BoxGeometry(3, 3, armLen), fingerMat);
  alArmTop.position.set(0, armH / 2 - 1.5, 0);
  t03Sub.add(alArmTop);
  const alArmBot = new THREE.Mesh(new THREE.BoxGeometry(3, 3, armLen), fingerMat);
  alArmBot.position.set(0, -(armH / 2 - 1.5), 0);
  t03Sub.add(alArmBot);
  const alFingerTop = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), fingerMat);
  alFingerTop.position.set(0, outerR + 2, -armLen / 2);
  t03Sub.add(alFingerTop);
  const alFingerBot = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), fingerMat);
  alFingerBot.position.set(0, -(outerR + 2), -armLen / 2);
  t03Sub.add(alFingerBot);
  t03Sub.position.set(0, TOOL_SP * 2, 0);
  gangGroup.add(t03Sub);
  alGripperMesh = t03Sub;

  // 갱 메타데이터
  const t02OpenY = outerR + 1.5;
  const t02CutY = innerR > 0 ? -(innerR + 2) : -2;
  gangGroup.userData = {
    toolSpacing: TOOL_SP,
    t02OpenY, t02CutY,
    t01TipOffset: bbTipOffset,
    t01LocalY: TOOL_SP,
    t03LocalY: TOOL_SP * 2,
    t03FingerOffset: armLen / 2,
    fingerTop: alFingerTop,
    fingerBot: alFingerBot,
  };

  // 초기 위치: T02 기준 대기
  gangRestZ = stickoutLen + 15;
  gangGroup.position.set(0, t02OpenY, gangRestZ);
  scene.add(gangGroup);

  /* Camera — 가공 영역(척 우측) 포커스 */
  camera.position.set(stickoutLen * 0.6, stickoutLen * 0.4, stickoutLen * 1.0);
  controls.target.set(0, 0, stickoutLen * 0.4);
  controls.update();

  buildAnimSteps();
  updateLegend();
  setStatus(`총 ${result.total}개 | 초기 ${result.pcsChuck}개/척 × ${1 + result.autoPulls}사이클 + 잔여 ${result.remainPcs}개 | 재생 버튼을 눌러주세요`);
}

/* ── Animation Steps ── */
function buildAnimSteps() {
  if (!result) return;
  animSteps = [];
  const r = result;
  const totalLen = segments.reduce((s, seg) => s + seg.len, 0);

  // Helper: find segment world Z center
  const segWorldZ = (seg) => barGroup.position.z + seg.zStart + seg.len / 2;

  // Collect cycles in machining order: cycle 0 first, then 1..autoPulls, then residual (-2)
  const cycleOrder = [0];
  for (let a = 1; a <= r.autoPulls; a++) cycleOrder.push(a);
  if (r.remainPcs > 0) cycleOrder.push(-2);

  // 갱타입 가공 순서:
  // 1) 스핀들 시작
  // 2) 페이스컷 + 첫 파팅 동시 (파팅이 잘리면서 페이스컷 부분 자동 탈락)
  // 3) 이후 반복: 보링(제품 가공) → 파팅(절단)

  const faceSegs = segments.filter(s => s.type === 'faceCut');
  animSteps.push({ type: 'spinStart', label: '스핀들 회전 시작' });

  // 각 사이클별 첫 파팅 위치 계산 (정확한 pullDist 산출용)
  const cycleFirstParting = {};
  cycleOrder.forEach(cyc => {
    const fp = segments.find(s => s.cycle === cyc && s.type === 'parting');
    if (fp) cycleFirstParting[cyc] = fp.zStart;
  });

  let isFirst = true;
  let prevCycle = null;
  cycleOrder.forEach(cyc => {
    const cycSegs = segments.filter(s => s.cycle === cyc);
    const products = cycSegs.filter(s => s.type === 'product' || s.type === 'residual');
    const partings = cycSegs.filter(s => s.type === 'parting');

    if (!isFirst) {
      // 실제 세그먼트 간격 기반 pullDist (이전 사이클 첫파팅 ~ 현재 사이클 첫파팅)
      const exactPull = (cycleFirstParting[prevCycle] ?? 0) - (cycleFirstParting[cyc] ?? 0);

      animSteps.push({ type: 'spinStop', label: 'AL 인출 준비' });
      animSteps.push({
        type: 'alPull', cycle: cyc, pullDist: exactPull,
        label: cyc === -2 ? '잔여 가공 위치 이동' : `AL ${cyc}차 인출`
      });
      animSteps.push({ type: 'spinStart', label: '스핀들 재회전' });

      // AL 인출 후 파팅 절단 → 파팅 + 마진 동시 탈락
      const marginSeg = cycSegs.find(s => s.type === 'margin');
      const rightmostParting = [...partings].sort((a, b) => b.zStart - a.zStart)[0];
      if (rightmostParting) {
        animSteps.push({
          type: 'alPartCut', seg: rightmostParting, marginSeg: marginSeg,
          label: 'AL 후 파팅 절단 → 파팅+마진 탈락'
        });
      }
    }

    // 제품을 face쪽(오른쪽)부터 척쪽(왼쪽)으로 가공
    const sortedProducts = [...products].sort((a, b) => b.zStart - a.zStart);

    sortedProducts.forEach((prod, i) => {
      if (isFirst && i === 0 && faceSegs.length > 0) {
        // 첫 제품: 페이스컷 + 파팅 동시 (파팅이 잘리면 페이스컷 부분도 탈락)
        const rightParting = partings.find(
          p => Math.abs(p.zStart - (prod.zStart + prod.len)) < 0.1
        );
        animSteps.push({
          type: 'facePart', seg: faceSegs[0],
          partSeg: rightParting, prodSeg: prod,
          label: '페이스컷 + 파팅 동시 절단'
        });
      }

      // 보링 (제품 가공)
      const pType = prod.type === 'residual' ? '잔여' : '';
      animSteps.push({
        type: 'machine', seg: prod,
        label: `${pType}제품 보링 (${cyc >= 0 ? cyc + '사이클' : '잔여'} #${i + 1})`
      });

      // 파팅 (왼쪽 파팅을 잘라서 제품 탈락)
      // 첫 제품은 이미 위에서 페이스컷+파팅 처리됨 → 왼쪽 파팅만
      const leftParting = partings.find(
        p => Math.abs((p.zStart + p.len) - prod.zStart) < 0.1
      );
      if (leftParting) {
        animSteps.push({
          type: 'partCut', seg: leftParting, prodSeg: prod,
          label: '파팅 절단 → 제품 탈락'
        });
      }
    });

    prevCycle = cyc;
    isFirst = false;
  });

  animSteps.push({ type: 'spinStop', label: '가공 완료' });
  animSteps.push({ type: 'done', label: `완료! 총 생산: ${r.total}개` });
}

/* ── Animation Engine ── */
let clock = new THREE.Clock();

function updateSpeed() {
  speedMul = parseFloat(document.getElementById('selSpeed').value);
}

function togglePlay() {
  playing = !playing;
  document.getElementById('btnPlay').textContent = playing ? '⏸ 일시정지' : '▶ 재생';
  if (playing && animIdx >= animSteps.length) resetAnim();
}
window.togglePlay = togglePlay;

// 떨어진 제품 메쉬 추적
let fallenPieces = [];

function resetAnim() {
  playing = false;
  animIdx = 0;
  animT = 0;
  barSpinning = false;
  document.getElementById('btnPlay').textContent = '▶ 재생';
  // Reset segment visuals
  segments.forEach(seg => {
    if (seg.mesh) {
      seg.mesh.material.opacity = 1;
      seg.mesh.material.transparent = false;
      seg.mesh.visible = true;
      seg.mesh.material.emissive = new THREE.Color(0x000000);
    }
    seg._fallen = false;
    seg._origY = 0;
  });
  // 떨어진 제품 제거
  fallenPieces.forEach(m => scene.remove(m));
  fallenPieces = [];
  // 갱 툴포스트 초기화
  if (gangGroup && gangGroup.userData) {
    resetGripperFingers();
    gangGroup.position.set(0, gangGroup.userData.t02OpenY, gangRestZ);
  }
  // barGroup 위치 초기화
  if (barGroup) {
    barGroup.position.z = initialBarZ;
  }
  if (chuckGroup) chuckGroup.position.z = initialChuckZ;
  setStatus('리셋 완료 – 재생 버튼을 눌러주세요');
}
window.resetAnim = resetAnim;

function setStatus(txt) {
  document.getElementById('status').textContent = txt;
}

/* Easing */
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

/* 절단바이트 애니메이션 헬퍼 — 갱 전체 Y 이동 (NC코드 기반)
   NC O9002 N180: G00 X[#111+1] → G01 X[#111] → U-[#118*2] W-[#118] → X[#504]
   갱 슬라이드가 Y축으로 이동 → T02(localY=0) 기준 */
function animatePartingBlade(p, cutPhaseEnd) {
  if (!gangGroup || !gangGroup.userData) return;
  const { t02OpenY, t02CutY } = gangGroup.userData;
  const odY = curOuterR * 0.5;
  if (p < 0.08) {
    const pp = p / 0.08;
    gangGroup.position.y = THREE.MathUtils.lerp(t02OpenY, odY + 1, easeInOut(pp));
  } else if (p < cutPhaseEnd) {
    const pp = (p - 0.08) / (cutPhaseEnd - 0.08);
    gangGroup.position.y = THREE.MathUtils.lerp(odY + 1, t02CutY, easeInOut(pp));
  } else if (p < cutPhaseEnd + 0.08) {
    gangGroup.position.y = t02CutY;
  } else {
    const pp = Math.min((p - cutPhaseEnd - 0.08) / 0.12, 1);
    gangGroup.position.y = THREE.MathUtils.lerp(t02CutY, t02OpenY, easeInOut(pp));
  }
}

/* AL 그리퍼 핑거 리셋 */
function resetGripperFingers() {
  if (!gangGroup || !gangGroup.userData) return;
  const { fingerTop, fingerBot } = gangGroup.userData;
  if (fingerTop) fingerTop.position.y = curOuterR + 2;
  if (fingerBot) fingerBot.position.y = -(curOuterR + 2);
}

/* Step processing */
let stepState = null;

function processStep(dt) {
  if (animIdx >= animSteps.length) { playing = false; return; }
  const step = animSteps[animIdx];

  if (!stepState) {
    // Initialize step
    stepState = { phase: 0, t: 0 };
    setStatus(step.label);
  }

  const spd = speedMul;
  stepState.t += dt * spd;

  switch (step.type) {
    case 'spinStart':
      barSpinning = true;
      nextStep();
      break;

    case 'spinStop':
      barSpinning = false;
      nextStep();
      break;

    case 'facePart': {
      /* NC O9002 N100: 갱 슬라이드 Y이동으로 T02 절단 */
      const dur = 2.5;
      const p = Math.min(stepState.t / dur, 1);
      const faceSeg = step.seg;
      const partSeg = step.partSeg;
      // 갱 Z를 파팅 세그먼트 위치로
      if (partSeg) gangGroup.position.z = barGroup.position.z + partSeg.zStart + partSeg.len / 2;

      animatePartingBlade(p, 0.4);
      if (p < 0.55) {
        const glow = Math.min(p / 0.4, 1) * 0.4;
        if (partSeg) partSeg.mesh.material.emissive = new THREE.Color(glow, glow * 0.3, 0);
        if (faceSeg) faceSeg.mesh.material.emissive = new THREE.Color(glow * 0.8, glow * 0.2, 0);
      } else if (p < 0.75) {
        const pp = (p - 0.55) / 0.2;
        if (partSeg) partSeg.mesh.material.emissive = new THREE.Color(0.4*(1-pp), 0.12*(1-pp), 0);
      } else {
        const pp = (p - 0.75) / 0.25;
        [faceSeg, partSeg].forEach(s => {
          if (s && s.mesh) {
            s.mesh.position.y = -easeInOut(pp) * 35;
            s.mesh.material.transparent = true;
            s.mesh.material.opacity = Math.max(0, 1 - pp * 1.2);
          }
        });
      }
      if (p >= 1) {
        if (faceSeg && faceSeg.mesh) { faceSeg.mesh.visible = false; faceSeg._fallen = true; }
        if (partSeg && partSeg.mesh) { partSeg.mesh.visible = false; partSeg._fallen = true; }
        nextStep();
      }
      break;
    }

    case 'machine': {
      // 보링: 갱 전체가 Y(T01 정렬) + Z(진입/후퇴) 이동
      const dur = 1.6;
      const p = Math.min(stepState.t / dur, 1);
      const seg = step.seg;
      const { t01TipOffset, t01LocalY } = gangGroup.userData;
      // 갱 Y: T01(localY=t01LocalY)이 봉재 중심(Y≈0) 위치
      gangGroup.position.y = (curOuterR - 2) - t01LocalY;
      // T01 팁 월드Z = gangGroup.z + 0 - t01TipOffset
      const segRightZ = barGroup.position.z + seg.zStart + seg.len;
      const grpAtRight = segRightZ + t01TipOffset;
      const grpAtDeep  = (segRightZ - P.finLen) + t01TipOffset;
      const restZ      = grpAtRight + 10;

      if (p < 0.25) {
        const pp = p / 0.25;
        gangGroup.position.z = THREE.MathUtils.lerp(restZ, grpAtRight, easeInOut(pp));
        const glow = pp * 0.15;
        seg.mesh.material.emissive = new THREE.Color(glow, glow * 0.5, 0);
      } else if (p < 0.65) {
        const pp = (p - 0.25) / 0.4;
        gangGroup.position.z = THREE.MathUtils.lerp(grpAtRight, grpAtDeep, easeInOut(pp));
        const glow = 0.15 + Math.sin(pp * Math.PI * 6) * 0.15;
        seg.mesh.material.emissive = new THREE.Color(glow, glow * 0.4, 0);
      } else if (p < 0.85) {
        const pp = (p - 0.65) / 0.2;
        gangGroup.position.z = THREE.MathUtils.lerp(grpAtDeep, restZ, easeInOut(pp));
        const glow = 0.15 * (1 - pp);
        seg.mesh.material.emissive = new THREE.Color(glow, glow * 0.4, 0);
      } else {
        gangGroup.position.z = restZ;
      }

      if (p >= 1) {
        seg.mesh.material.emissive = new THREE.Color(0x000000);
        nextStep();
      }
      break;
    }

    case 'partCut': {
      const dur = 2.2;
      const p = Math.min(stepState.t / dur, 1);
      const seg = step.seg;
      const prodSeg = step.prodSeg;
      gangGroup.position.z = barGroup.position.z + seg.zStart + seg.len / 2;

      animatePartingBlade(p, 0.35);
      if (p < 0.5) {
        const glow = Math.min(p / 0.35, 1) * 0.4;
        seg.mesh.material.emissive = new THREE.Color(glow, glow * 0.3, 0);
      } else if (p < 0.65) {
        const pp = (p - 0.5) / 0.15;
        seg.mesh.material.emissive = new THREE.Color(0.4*(1-pp), 0.12*(1-pp), 0);
      } else {
        const pp = (p - 0.65) / 0.35;
        [prodSeg, seg].forEach(s => {
          if (s && s.mesh && !s._fallen) {
            s.mesh.position.y = -easeInOut(pp) * 40;
            s.mesh.material.transparent = true;
            s.mesh.material.opacity = Math.max(0, 1 - pp * 1.2);
          }
        });
      }
      if (p >= 1) {
        [prodSeg, seg].forEach(s => { if (s && s.mesh) { s.mesh.visible = false; s._fallen = true; } });
        nextStep();
      }
      break;
    }

    case 'alPartCut': {
      const dur = 2.2;
      const p = Math.min(stepState.t / dur, 1);
      const seg = step.seg;
      const marginSeg = step.marginSeg;
      gangGroup.position.z = barGroup.position.z + seg.zStart + seg.len / 2;

      animatePartingBlade(p, 0.35);
      if (p < 0.5) {
        const glow = Math.min(p / 0.35, 1) * 0.4;
        seg.mesh.material.emissive = new THREE.Color(glow, glow * 0.3, 0);
      } else if (p < 0.65) {
        const pp = (p - 0.5) / 0.15;
        seg.mesh.material.emissive = new THREE.Color(0.4*(1-pp), 0.12*(1-pp), 0);
      } else {
        const pp = (p - 0.65) / 0.35;
        [seg, marginSeg].forEach(s => {
          if (s && s.mesh && !s._fallen) {
            s.mesh.position.y = -easeInOut(pp) * 40;
            s.mesh.material.transparent = true;
            s.mesh.material.opacity = Math.max(0, 1 - pp * 1.2);
          }
        });
      }
      if (p >= 1) {
        if (seg.mesh) { seg.mesh.visible = false; seg._fallen = true; }
        if (marginSeg && marginSeg.mesh) { marginSeg.mesh.visible = false; marginSeg._fallen = true; }
        nextStep();
      }
      break;
    }

    case 'alPull': {
      // 오토링크 인출: 갱 슬라이드 전체로 T03 그리퍼 접근→잡기→당기기→놓기→후퇴
      const dur = 4.0;
      const p = Math.min(stepState.t / dur, 1);
      const pullDist = step.pullDist || (result.machLen + P.tipWidth + P.margin);
      const { t03LocalY, t03FingerOffset, fingerTop, fingerBot } = gangGroup.userData;

      if (stepState.phase === 0) {
        stepState.startBarZ = barGroup ? barGroup.position.z : 0;
        const visSegs = segments.filter(s => !s._fallen && s.mesh && s.mesh.visible);
        const visRightLocal = visSegs.length > 0
          ? Math.max(...visSegs.map(s => s.zStart + s.len)) : 0;
        const barVisRightZ = stepState.startBarZ + visRightLocal;
        // 갱 Z: T03 핑거(localZ=-fOff)가 바 끝에 오려면 gangZ = barEnd + fOff
        stepState.gripperGrabZ = barVisRightZ + t03FingerOffset;
        stepState.gripperRestZ = barVisRightZ + t03FingerOffset + 5;
        // 갱 Y: T03(localY=t03LocalY)이 중심(Y=0)에 오려면 gangY = -t03LocalY
        stepState.gangYForT03 = -t03LocalY;
        stepState.phase = 1;
      }

      const openFY = curOuterR + 2;
      const closeFY = curOuterR * 0.4;

      // 갱 Y를 T03 정렬 위치로
      gangGroup.position.y = stepState.gangYForT03;

      if (p < 0.12) {
        const pp = p / 0.12;
        gangGroup.position.z = THREE.MathUtils.lerp(stepState.gripperRestZ, stepState.gripperGrabZ, easeInOut(pp));
        fingerTop.position.y = openFY;
        fingerBot.position.y = -openFY;
      } else if (p < 0.22) {
        gangGroup.position.z = stepState.gripperGrabZ;
        const pp = (p - 0.12) / 0.1;
        const y = THREE.MathUtils.lerp(openFY, closeFY, easeInOut(pp));
        fingerTop.position.y = y;
        fingerBot.position.y = -y;
      } else if (p < 0.72) {
        fingerTop.position.y = closeFY;
        fingerBot.position.y = -closeFY;
        const pp = (p - 0.22) / 0.5;
        const offset = easeInOut(pp) * pullDist;
        if (barGroup) barGroup.position.z = stepState.startBarZ + offset;
        gangGroup.position.z = stepState.gripperGrabZ + offset;
      } else if (p < 0.82) {
        if (barGroup) barGroup.position.z = stepState.startBarZ + pullDist;
        gangGroup.position.z = stepState.gripperGrabZ + pullDist;
        const pp = (p - 0.72) / 0.1;
        const y = THREE.MathUtils.lerp(closeFY, openFY, easeInOut(pp));
        fingerTop.position.y = y;
        fingerBot.position.y = -y;
      } else {
        if (barGroup) barGroup.position.z = stepState.startBarZ + pullDist;
        fingerTop.position.y = openFY;
        fingerBot.position.y = -openFY;
        const pp = (p - 0.82) / 0.18;
        gangGroup.position.z = THREE.MathUtils.lerp(
          stepState.gripperGrabZ + pullDist, stepState.gripperRestZ + pullDist, easeInOut(pp)
        );
      }

      if (p >= 1) {
        resetGripperFingers();
        nextStep();
      }
      break;
    }

    case 'done':
      setStatus(step.label);
      playing = false;
      document.getElementById('btnPlay').textContent = '▶ 재생';
      animIdx = animSteps.length;
      stepState = null;
      return;

    default:
      nextStep();
  }
}

function nextStep() {
  animIdx++;
  stepState = null;
}

/* ── Legend ── */
function updateLegend() {
  const pc = '#' + productColor.toString(16).padStart(6, '0');
  const matName = { 1: 'CN', 2: 'RS40', 3: 'CM' }[P.matType] || '';
  const items = [
    ['#d63031', '잔재(스크랩)'],
    ['#7c1a1a', '조 그립'],
    ['#3d0c0c', '안전구간'],
    [pc, `제품(${matName})`],
    [pc, '잔여제품'],
    ['#e17055', '파팅'],
    ['#fdcb6e', '마진'],
    ['#6c5ce7', '페이스컷'],
  ];
  document.getElementById('legend').innerHTML = items.map(
    ([c, l]) => `<span><b style="background:${c}"></b>${l}</span>`
  ).join('');
}

/* ── Rebuild ── */
function rebuild() {
  const ml = parseInt(document.getElementById('inMatLen').value) || 543;
  P.matLen = ml;
  resetAnim();
  buildScene(ml);
}
window.rebuild = rebuild;

/* ── Resize ── */
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

/* ── Render Loop ── */
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  controls.update();

  // Bar spinning
  if (barGroup && barSpinning) {
    barGroup.rotation.z += dt * 12;
  }

  // Anim
  if (playing) {
    processStep(dt);
  }

  renderer.render(scene, camera);
}

/* ── Init ── */
document.getElementById('inMatLen').value = P.matLen;
document.getElementById('paramInfo').textContent =
  `완성${P.finLen} | 팁${P.tipWidth} | 척${P.chuckInit} | 안전${P.safetyLen} | 좌한${P.chuckLeft} | 척투조${P.chuck2jaw} | 면취${P.faceCut} | 소재${P.matLen}`;
buildScene(P.matLen);
clock.start();
animate();
</script>
