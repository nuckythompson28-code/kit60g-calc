<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KIT60G 생산개수 계산기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Malgun Gothic', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  padding: 12px; font-size: 14px;
  -webkit-text-size-adjust: none;
}
h1 {
  text-align: center; font-size: 18px; color: #00d4ff;
  margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px;
}
.card { background: #16213e; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.card h2 { font-size: 14px; color: #00d4ff; margin-bottom: 10px; }
.row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
.row label { flex: 1; font-size: 13px; color: #aaa; }
.row input, .row select {
  width: 90px; padding: 8px; border: 1px solid #444; border-radius: 6px;
  background: #0f3460; color: #fff; font-size: 15px;
  text-align: center; -webkit-appearance: none;
}
.row select { width: 120px; }
.row .unit { font-size: 12px; color: #666; width: 30px; }
.btn {
  width: 100%; padding: 14px; background: #e94560; color: #fff;
  border: none; border-radius: 10px; font-size: 16px;
  font-weight: bold; cursor: pointer; margin-bottom: 12px;
}
.btn:active { background: #c73550; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
.tab-bar .btn { flex: 1; padding: 10px 4px; font-size: 12px; background: #16213e; border-radius: 8px; margin: 0; }
.tab-bar .btn.active { background: #e94560; }
.tab { display: none; }
.tab.active { display: block; }
.quick-card { background: #0f3460; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.quick-card h2 { font-size: 14px; color: #00d4ff; margin-bottom: 10px; }
.quick-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.quick-row input {
  width: 80px; padding: 10px; border: 2px solid #e94560;
  border-radius: 8px; background: #1a1a2e; color: #fff;
  font-size: 18px; text-align: center;
}
.quick-result { background: #1a1a2e; border-radius: 8px; padding: 12px; text-align: center; margin-top: 8px; }
.quick-result .big { font-size: 36px; font-weight: bold; color: #e94560; }
.quick-result .detail { font-size: 12px; color: #888; margin-top: 4px; }
.chuck-info { display: flex; justify-content: space-around; background: #1a1a2e; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.chuck-info div { text-align: center; }
.chuck-info .val { font-size: 20px; font-weight: bold; color: #00d4ff; }
.chuck-info .lbl { font-size: 11px; color: #888; }
.range-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.range-table th { background: #0f3460; padding: 8px 4px; text-align: center; font-size: 11px; color: #aaa; position: sticky; top: 0; }
.range-table td { padding: 7px 4px; text-align: center; border-bottom: 1px solid #222; }
.range-table tr:nth-child(even) { background: #1a1a2e; }
.range-table .pcs { color: #00d4ff; font-weight: bold; font-size: 14px; }
.range-table .al-match { color: #e94560; font-size: 11px; }
.range-table .hl { background: #0f3460 !important; }
.dz-box { background: #1a1a2e; border-radius: 8px; padding: 10px; font-size: 13px; line-height: 1.8; }
.dz-box .total { color: #e94560; font-weight: bold; font-size: 15px; }
/* viz */
.legend { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; margin-top: 10px; line-height: 1.8; }
.legend span b { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }
.viz-stats { font-size: 13px; margin-top: 6px; line-height: 1.8; color: #aaa; }
.cycle-row { margin-bottom: 8px; }
.cycle-lbl { font-size: 11px; color: #888; margin-bottom: 3px; }
.cycle-lbl.remain { color: #0984e3; }
/* anim */
.anim-event {
  background: #0a0a1a; border-radius: 8px; padding: 10px 14px;
  font-size: 14px; font-weight: bold; color: #00d4ff;
  min-height: 38px; display: flex; align-items: center;
  margin-bottom: 6px; border: 1px solid #333; transition: background 0.2s;
}
.anim-event.al  { background: #2d1f00; border-color: #fdcb6e; color: #fdcb6e; }
.anim-event.done { background: #001a10; border-color: #00b894; color: #00b894; }
.prog-wrap { display: flex; align-items: center; margin: 6px 0 10px; }
.prog-bg { flex: 1; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
.prog-bar { height: 100%; background: #e94560; border-radius: 3px; width: 0%; transition: width 0.1s; }
.anim-ctrl { display: flex; gap: 6px; align-items: center; }
.anim-btn { flex: 1; padding: 10px 4px; font-size: 12px; background: #16213e; border-radius: 8px; margin: 0; width: auto; border: none; color: #fff; cursor: pointer; }
.anim-btn:active { background: #0f3460; }
.spd-sel { padding: 8px 6px; border: 1px solid #444; border-radius: 8px; background: #0f3460; color: #fff; font-size: 12px; -webkit-appearance: none; }
</style>
</head>
<body>

<h1>KIT60G 생산개수 계산기</h1>

<!-- 빠른 계산 -->
<div class="quick-card">
  <h2>빠른 계산</h2>
  <div class="quick-row">
    <label style="color:#aaa">#102</label>
    <select id="q102" onchange="quickCalc()">
      <option value="0">0</option><option value="100">100</option>
      <option value="200">200</option><option value="300">300</option>
      <option value="400">400</option><option value="500" selected>500</option>
    </select>
    <label style="color:#aaa">#101</label>
    <input type="number" id="q101" value="43" min="0" max="99" inputmode="numeric" oninput="quickCalc()">
  </div>
  <div class="quick-result" id="quickResult">
    <div class="big">--</div><div class="detail">위 값을 입력하세요</div>
  </div>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <button class="btn active" onclick="switchTab('settings')">설정</button>
  <button class="btn" onclick="switchTab('table')">범위표</button>
  <button class="btn" onclick="switchTab('deadzone')">데드존</button>
  <button class="btn" onclick="switchTab('viz')">시각화</button>
</div>

<!-- 설정 탭 -->
<div id="tab-settings" class="tab active">
  <div class="card">
    <h2>제품 설정</h2>
    <div class="row"><label>완성 길이 (#113)</label><input type="number" id="finLen" value="8.0" step="0.001" inputmode="decimal"><span class="unit">mm</span></div>
    <div class="row"><label>팁 폭 (#114)</label><input type="number" id="tipWidth" value="2.0" step="0.01" inputmode="decimal"><span class="unit">mm</span></div>
    <div class="row"><label>소재 타입 (#105)</label>
      <select id="matType">
        <option value="1">1: CN</option><option value="2">2: RS40</option><option value="3" selected>3: CM</option>
      </select>
    </div>
  </div>
  <div class="card">
    <h2>장비 설정</h2>
    <div class="row"><label>척 길이 (#103)</label><input type="number" id="chuckInit" value="75" step="1" inputmode="numeric"><span class="unit">mm</span></div>
    <div class="row"><label>안전 거리 (#530)</label><input type="number" id="safetyLen" value="12" step="1" inputmode="numeric"><span class="unit">mm</span></div>
    <div class="row"><label>척 좌측 한계 (#531)</label><input type="number" id="chuckLeft" value="15" step="1" inputmode="numeric"><span class="unit">mm</span></div>
    <div class="row"><label>척투조 거리 (#532)</label><input type="number" id="chuck2jaw" value="1.03" step="0.01" inputmode="decimal"><span class="unit">mm</span></div>
    <div class="row"><label>페이스컷 (#104)</label><input type="number" id="faceCut" value="1" step="0.1" inputmode="decimal"><span class="unit">mm</span></div>
    <div class="row"><label>마진 (#123)</label><input type="number" id="margin" value="0.2" step="0.1" inputmode="decimal"><span class="unit">mm</span></div>
  </div>
  <button class="btn" onclick="calculate()">계산하기</button>
</div>

<!-- 범위표 탭 -->
<div id="tab-table" class="tab">
  <div class="card">
    <h2 id="tableTitle">계산 결과</h2>
    <div class="chuck-info" id="chuckInfo"></div>
    <div style="overflow-x:auto">
      <table class="range-table">
        <thead><tr><th>소재길이</th><th>총개수</th><th>AL</th><th>잔재</th><th>버림</th></tr></thead>
        <tbody id="rangeBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 데드존 탭 -->
<div id="tab-deadzone" class="tab">
  <div class="card">
    <h2>못 쓰는 구간 (데드존)</h2>
    <div class="dz-box" id="dzInfo"></div>
  </div>
</div>

<!-- 시각화 탭 -->
<div id="tab-viz" class="tab">
  <div class="card">
    <h2 id="vizTitle">소재 배치 시각화</h2>
    <div style="background:#1a1a2e;border-radius:8px;padding:10px;margin-bottom:10px">
      <div id="vizBar"></div>
      <div class="legend">
        <span><b style="background:#00b894"></b>메인제품 — #113</span>
        <span><b style="background:#0984e3"></b>잔재제품 — O9003</span>
        <span><b style="background:#e17055"></b>파팅 — #114 칼날폭</span>
        <span><b style="background:#fdcb6e"></b>마진 — #123 AL여유</span>
        <span><b style="background:#636e72"></b>구분자 — #114 위치보정</span>
        <span><b style="background:#6c5ce7"></b>페이스컷 — #104</span>
        <span><b style="background:#d63031"></b>스크랩 — 자투리</span>
        <span><b style="background:#7c1a1a;border:1px solid #e94560"></b>조물림 DZ — #531</span>
        <span><b style="background:#3d0c0c;border:1px solid #e94560"></b>조바깥 DZ — #530+#532</span>
      </div>
      <div class="viz-stats" id="vizStats"></div>
    </div>
    <div id="vizCycles"></div>

    <!-- 애니메이션 -->
    <div style="margin-top:16px;border-top:1px solid #333;padding-top:14px">
      <h3 style="font-size:13px;color:#00d4ff;margin-bottom:10px">▶ 가공 애니메이션</h3>
      <div class="anim-event" id="animEvent">재생 버튼을 눌러 시작</div>
      <div id="animCanvas" style="margin:8px 0"></div>
      <div class="prog-wrap">
        <div class="prog-bg"><div class="prog-bar" id="animProg"></div></div>
        <span id="animStep" style="font-size:11px;color:#666;margin-left:6px">0/0</span>
      </div>
      <div class="anim-ctrl">
        <button class="anim-btn" onclick="animPlay()">▶ 재생</button>
        <button class="anim-btn" onclick="animPause()">⏸ 정지</button>
        <button class="anim-btn" onclick="animReset()">↺ 초기화</button>
        <select id="animSpd" class="spd-sel">
          <option value="400">느림</option>
          <option value="180" selected>보통</option>
          <option value="70">빠름</option>
          <option value="20">초고속</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── 파라미터 ── */
let G = {};

function getP() {
  const mt = parseInt(document.getElementById('matType').value);
  return {
    finLen:    parseFloat(document.getElementById('finLen').value),
    tipWidth:  parseFloat(document.getElementById('tipWidth').value),
    chuckInit: parseFloat(document.getElementById('chuckInit').value),
    safetyLen: parseFloat(document.getElementById('safetyLen').value),
    chuckLeft: parseFloat(document.getElementById('chuckLeft').value),
    chuck2jaw: parseFloat(document.getElementById('chuck2jaw').value),
    faceCut:   parseFloat(document.getElementById('faceCut').value),
    margin:    parseFloat(document.getElementById('margin').value),
    residual:  (mt === 2) ? 15 : 0,
    matType:   mt
  };
}

/* ── 계산 ── */
function calc(p, matLen) {
  const unitW    = p.finLen + p.tipWidth;
  const deadZone = p.chuckLeft + p.chuck2jaw + p.safetyLen;
  const pcsChuck = Math.floor((p.chuckInit - p.safetyLen) / unitW);
  if (pcsChuck < 1) return null;
  const machLen  = pcsChuck * unitW;
  const effMat   = matLen - p.residual;

  if (effMat <= machLen + p.safetyLen) return null;

  let autoPulls = Math.floor(
    (effMat - deadZone - machLen - p.tipWidth - p.faceCut)
    / (machLen + p.tipWidth + p.margin)
  );
  if (autoPulls < 0) autoPulls = 0;

  const consumed  = (machLen + p.tipWidth + p.faceCut)
                  + autoPulls * (machLen + p.tipWidth + p.margin);
  const remainRaw = effMat - consumed - deadZone - (p.tipWidth + p.margin);
  const remainPcs = Math.max(0, Math.floor(remainRaw / unitW));
  const scrap     = remainPcs > 0
                  ? Math.max(0, remainRaw - remainPcs * unitW)
                  : Math.max(0, remainRaw);
  const total     = pcsChuck * (1 + autoPulls) + remainPcs;

  return { total, autoPulls, remainPcs, scrap, pcsChuck, machLen, unitW, deadZone };
}

/* ═══════════════════════════════════════════
   시각화 세그먼트 빌더 (왼→오 단방향)
   ════════════════════════════════════════ */
/*
  물리적 배치 (왼=척, 오=face):

  [스크랩] [#531 조물림] [#530+#532 조바깥] [잔재피스×N] [마진#123][구분#114] [메인사이클들...] [페이스컷#104]

  메인사이클 (왼=마지막AL, 오=초기척킹):
    [구분#114][피스×M] (사이클1) [마진#123] [구분#114][피스×M] (사이클2) [마진#123] ... [페이스컷]

  잔재 없을 때: 스크랩 크기에 (#114+#123) 흡수
*/
function buildSegs(p, matLen, r) {
  const segs = [];
  const S = (x, w, c, lbl) => { if (w > 0.01) segs.push({ x, w, c, lbl: lbl || '' }); };
  let x = 0;

  // 잔재 있을 때: #114(1개)는 첫 메인사이클 구분자로 처리 → scrap에 tipWidth 흡수
  // 잔재 없을 때: #114+#123 전부 scrap에 흡수
  const scrapViz = r.remainPcs > 0
    ? r.scrap + p.tipWidth
    : r.scrap + p.tipWidth + p.margin;

  // 1. 스크랩
  S(x, scrapViz, '#d63031', `스크랩 ${scrapViz.toFixed(1)}`);
  x += scrapViz;

  // 2. #531 조물림 DZ
  S(x, p.chuckLeft, '#7c1a1a', `조물림 ${p.chuckLeft}`);
  x += p.chuckLeft;

  // 3. #530+#532 조바깥 DZ
  S(x, p.safetyLen + p.chuck2jaw, '#3d0c0c', `조바깥 ${(p.safetyLen + p.chuck2jaw).toFixed(1)}`);
  x += p.safetyLen + p.chuck2jaw;

  // 4. RS40 잔재안전값
  if (p.residual > 0) {
    S(x, p.residual, '#2d1b69', `잔재안전 ${p.residual}`);
    x += p.residual;
  }

  // 5. 잔재 피스 (O9003)
  const pcsMain = r.pcsChuck * (1 + r.autoPulls);
  for (let j = 0; j < r.remainPcs; j++) {
    const pn = pcsMain + j + 1;
    S(x,              p.tipWidth, '#e17055', `잔재${pn} 파팅`);
    S(x + p.tipWidth, p.finLen,   '#0984e3', `잔재${pn}`);
    x += r.unitW;
  }

  // 6. 잔재/메인 구분자 (잔재 있을 때만) — 마진#123 노랑만
  //    #114(회색)는 아래 메인사이클 첫 구분자가 담당
  if (r.remainPcs > 0) {
    S(x, p.margin, '#fdcb6e', 'AL마진');
    x += p.margin;
  }

  // 7. 메인 사이클들 (왼=마지막AL, 오=초기척킹)
  //    패턴: [구분#114][피스들] × cycles, 사이클 사이: [마진#123]
  for (let cyc = 0; cyc <= r.autoPulls; cyc++) {
    // 구분자 (각 사이클 왼쪽)
    const cycLabel = cyc === r.autoPulls ? '초기척킹' : `AL${r.autoPulls - cyc}`;
    S(x, p.tipWidth, '#636e72', cycLabel);
    x += p.tipWidth;

    // 피스들 (왼=깊은곳, 오=face쪽)
    for (let j = 0; j < r.pcsChuck; j++) {
      // 사이클 번호: cyc=0이 맨왼쪽(마지막AL), cyc=autoPulls가 초기
      const cycNum = r.autoPulls - cyc;   // 0=초기, autoPulls=마지막AL
      const pn = cycNum * r.pcsChuck + j + 1;
      S(x,              p.tipWidth, '#e17055', `${pn}`);
      S(x + p.tipWidth, p.finLen,   '#00b894', `${pn}`);
      x += r.unitW;
    }

    // 사이클 사이 마진 (마지막 사이클=초기척킹 이후에는 없음)
    if (cyc < r.autoPulls) {
      S(x, p.margin, '#fdcb6e', 'AL마진');
      x += p.margin;
    }
  }

  // 8. 페이스컷
  S(x, p.faceCut, '#6c5ce7', `페이스컷`);
  x += p.faceCut;

  return segs;
}

/* ── 시각화 렌더 ── */
function renderViz() {
  const p      = G.p || getP();
  const v102   = parseInt(document.getElementById('q102').value);
  const v101   = parseInt(document.getElementById('q101').value) || 0;
  const matLen = v102 + v101;
  const r      = calc(p, matLen);

  const barEl    = document.getElementById('vizBar');
  const statsEl  = document.getElementById('vizStats');
  const cyclesEl = document.getElementById('vizCycles');
  document.getElementById('vizTitle').textContent = `소재 배치 시각화 — ${matLen}mm`;

  if (!r) {
    barEl.innerHTML = '<p style="color:#e94560;text-align:center;padding:16px">소재 길이 부족</p>';
    statsEl.innerHTML = ''; cyclesEl.innerHTML = '';
    return;
  }

  const W  = Math.max(barEl.clientWidth || 300, 200);
  const sc = (W - 2) / matLen;
  const BH = 48;

  const segs = buildSegs(p, matLen, r);

  let svg = '';
  segs.forEach(s => {
    const px = (1 + s.x * sc).toFixed(1);
    const pw = Math.max(s.w * sc, 0.5).toFixed(1);
    svg += `<rect x="${px}" y="0" width="${pw}" height="${BH}" fill="${s.c}" stroke="#0a0a1a" stroke-width="0.2"/>`;
    if (parseFloat(pw) > 18) {
      const fs = Math.min(9, parseFloat(pw) * 0.35);
      const cx = (parseFloat(px) + parseFloat(pw) / 2).toFixed(1);
      svg += `<text x="${cx}" y="${BH/2+4}" text-anchor="middle" fill="#fff" font-size="${fs}" font-weight="bold">${s.lbl || Math.round(s.w)}</text>`;
    }
  });

  // DZ 경계선 + 라벨
  const dzX = (1 + (r.scrap + r.deadZone + p.residual) * sc).toFixed(1);
  svg += `<line x1="${dzX}" y1="0" x2="${dzX}" y2="${BH}" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>`;
  svg += `<text x="3" y="${BH-5}" fill="#e94560" font-size="8">척</text>`;
  svg += `<text x="${W-30}" y="${BH-5}" fill="#555" font-size="8">face</text>`;

  barEl.innerHTML =
    `<svg width="${W}" height="${BH}" style="display:block;border-radius:6px;overflow:hidden;border:1px solid #333;background:#0d0d1a">${svg}</svg>
     <div style="display:flex;justify-content:space-between;font-size:10px;color:#555;margin:2px 0 0"><span>0</span><span>${matLen}mm</span></div>`;

  const deadTotal = r.deadZone + p.residual;
  const matName   = p.residual > 0 ? 'RS40' : ['','CN','RS40','CM'][p.matType] || '기타';
  statsEl.innerHTML = `
    <div style="margin-top:4px">
      <b style="color:#00b894">메인 ${r.pcsChuck*(1+r.autoPulls)}개</b> +
      <b style="color:#0984e3">잔재 ${r.remainPcs}개</b> =
      <b style="color:#fff">총 ${r.total}개</b>
    </div>
    <div style="font-size:12px;color:#888;margin-top:2px">
      AL ${r.autoPulls}회 | 척당 ${r.pcsChuck}개 | 피치 ${r.unitW}mm |
      스크랩 ${r.scrap.toFixed(1)}mm | 데드존 ${deadTotal.toFixed(1)}mm
    </div>`;

  // 사이클 상세
  const totalCyc = 1 + r.autoPulls;
  const CW    = W - 4;
  const slotW = CW / r.pcsChuck;
  const CH    = 20;
  let cycHtml = '';

  for (let i = 0; i < totalCyc; i++) {
    const label  = i === 0 ? '초기 척킹' : `AL ${i}회차`;
    const pStart = i * r.pcsChuck + 1;
    const pEnd   = (i + 1) * r.pcsChuck;
    let bars = '';
    for (let j = 0; j < r.pcsChuck; j++) {
      const bx  = (j * slotW + 1).toFixed(1);
      const pw  = Math.max(slotW * p.finLen / r.unitW - 1, 1).toFixed(1);
      const ptx = (parseFloat(bx) + parseFloat(pw) + 0.5).toFixed(1);
      const ptw = Math.max(slotW * p.tipWidth / r.unitW - 0.5, 0.5).toFixed(1);
      bars += `<rect x="${bx}" y="1" width="${pw}" height="${CH-2}" fill="#00b894" rx="2"/>`;
      bars += `<rect x="${ptx}" y="1" width="${ptw}" height="${CH-2}" fill="#e17055" rx="1"/>`;
      if (parseFloat(pw) > 16) bars += `<text x="${(parseFloat(bx)+parseFloat(pw)/2).toFixed(1)}" y="${CH/2+4}" text-anchor="middle" fill="#fff" font-size="8">${pStart+j}</text>`;
    }
    cycHtml += `<div class="cycle-row"><div class="cycle-lbl">${label} — #${pStart}~${pEnd} (${r.pcsChuck}개)</div>
      <svg width="${CW}" height="${CH}" style="display:block;background:#0a0a1a;border-radius:4px">${bars}</svg></div>`;
  }

  if (r.remainPcs > 0) {
    const rStart = totalCyc * r.pcsChuck + 1;
    const rEnd   = rStart + r.remainPcs - 1;
    const rW     = Math.min(CW, Math.ceil(r.remainPcs * slotW + 2));
    let bars = '';
    for (let j = 0; j < r.remainPcs; j++) {
      const bx  = (j * slotW + 1).toFixed(1);
      const pw  = Math.max(slotW * p.finLen / r.unitW - 1, 1).toFixed(1);
      const ptx = (parseFloat(bx) + parseFloat(pw) + 0.5).toFixed(1);
      const ptw = Math.max(slotW * p.tipWidth / r.unitW - 0.5, 0.5).toFixed(1);
      bars += `<rect x="${bx}" y="1" width="${pw}" height="${CH-2}" fill="#0984e3" rx="2"/>`;
      bars += `<rect x="${ptx}" y="1" width="${ptw}" height="${CH-2}" fill="#e17055" rx="1"/>`;
      if (parseFloat(pw) > 16) bars += `<text x="${(parseFloat(bx)+parseFloat(pw)/2).toFixed(1)}" y="${CH/2+4}" text-anchor="middle" fill="#fff" font-size="8">${rStart+j}</text>`;
    }
    cycHtml += `<div class="cycle-row"><div class="cycle-lbl remain">잔재 인출 (O9003) — #${rStart}~${rEnd} (${r.remainPcs}개)</div>
      <svg width="${rW}" height="${CH}" style="display:block;background:#0a0a1a;border-radius:4px">${bars}</svg></div>`;
  }

  cyclesEl.innerHTML = cycHtml ? `<h3 style="font-size:13px;color:#00d4ff;margin-bottom:8px">사이클별 상세</h3>${cycHtml}` : '';
}

/* ═══════════════════════════════════════════
   애니메이션
   ════════════════════════════════════════ */
const AN = { segs: [], maxStep: 0, cur: 0, tid: null, matLen: 0, p: null, r: null };

function buildAnimSegs(p, matLen, r) {
  // step-based: each element has a step number; show all segs with step <= cur
  const segs = [];
  let step = 0;
  const S = (x, w, c, ev, isEv) => segs.push({ step, x, w, c, ev: ev || '', isEv: !!isEv });

  // step 0: background bar
  S(0, matLen, '#1e1e35', '');

  // step 1: face cut
  step = 1;
  let x = matLen - p.faceCut;
  S(x, p.faceCut, '#6c5ce7', '✂ 페이스컷 #104');
  x -= p.faceCut;

  // step 2~: 초기 척킹 피스 (오→왼)
  for (let j = 0; j < r.pcsChuck; j++) {
    step++;
    const sx = x - (j + 1) * r.unitW;
    S(sx,              p.tipWidth, '#e17055', `#${j+1} 파팅`);
    S(sx + p.tipWidth, p.finLen,   '#00b894', `#${j+1} 가공완료 ✓`);
  }
  x -= r.pcsChuck * r.unitW;

  // 초기 구분자
  step++;
  S(x - p.tipWidth, p.tipWidth, '#636e72', 'AL 대기 #114');
  x -= p.tipWidth;

  // AL 사이클들
  for (let i = 0; i < r.autoPulls; i++) {
    step++; S(0, 0, '#000', `🔄 AL ${i+1}회 인출`, true);
    step++;
    S(x - p.margin, p.margin, '#fdcb6e', `AL ${i+1}회 마진 #123`);
    x -= p.margin;
    for (let j = 0; j < r.pcsChuck; j++) {
      step++;
      const pn  = (i + 1) * r.pcsChuck + j + 1;
      const sx  = x - (j + 1) * r.unitW;
      S(sx,              p.tipWidth, '#e17055', `#${pn} 파팅`);
      S(sx + p.tipWidth, p.finLen,   '#00b894', `#${pn} 가공완료 ✓`);
    }
    x -= r.pcsChuck * r.unitW;
    step++;
    S(x - p.tipWidth, p.tipWidth, '#636e72', 'AL 대기 #114');
    x -= p.tipWidth;
  }

  // 잔재 (왼→오)
  if (r.remainPcs > 0) {
    step++; S(0, 0, '#000', '🔄 잔재 인출 (O9003)', true);
    const pcsMain = r.pcsChuck * (1 + r.autoPulls);
    let lx = (r.remainPcs > 0 ? r.scrap : r.scrap + p.tipWidth + p.margin)
           + p.chuckLeft + p.safetyLen + p.chuck2jaw + p.residual;
    for (let j = 0; j < r.remainPcs; j++) {
      step++;
      const pn = pcsMain + j + 1;
      S(lx,              p.tipWidth, '#e17055', `잔재#${pn} 파팅`);
      S(lx + p.tipWidth, p.finLen,   '#0984e3', `잔재#${pn} 완료 ✓`);
      lx += r.unitW;
    }
    step++;
    S(lx, p.margin,   '#fdcb6e', 'AL마진 #123');
    S(lx + p.margin, p.tipWidth, '#636e72', '구분 #114');
  }

  // 완료
  step++;
  S(0, 0, '#000', `✅ 가공완료 — 총 ${r.total}개`, true);

  return { segs, maxStep: step };
}

function animDraw() {
  const p  = AN.p, matLen = AN.matLen, cur = AN.cur;
  const W  = Math.max(document.getElementById('animCanvas').clientWidth || 300, 200);
  const sc = (W - 2) / matLen;
  const BH = 48;

  const r       = AN.r;
  const scrapVz = r.remainPcs > 0 ? r.scrap : r.scrap + p.tipWidth + p.margin;

  const vis = AN.segs.filter(s => !s.isEv && s.step <= cur && s.w > 0.01);
  let svg = '';
  vis.forEach(s => {
    const px  = (1 + s.x * sc).toFixed(1);
    const pw  = Math.max(s.w * sc, 0.5).toFixed(1);
    const isNew = s.step === cur;
    svg += `<rect x="${px}" y="0" width="${pw}" height="${BH}" fill="${s.c}"
      stroke="${isNew ? '#fff' : '#0a0a1a'}" stroke-width="${isNew ? 1.5 : 0.2}" opacity="${isNew ? 1 : 0.88}"/>`;
  });

  // DZ overlay (항상 위에 렌더)
  let lx = 1;
  const scW = scrapVz * sc;
  if (scrapVz > 0.05) {
    svg += `<rect x="${lx}" y="0" width="${scW.toFixed(1)}" height="${BH}" fill="#d63031" stroke="#0a0a1a" stroke-width="0.5"/>`;
    if (scW > 18) svg += `<text x="${(lx+scW/2).toFixed(1)}" y="${BH/2+4}" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">${Math.round(scrapVz)}</text>`;
  }
  lx += scW;
  const j531w = Math.max(p.chuckLeft * sc, 1);
  svg += `<rect x="${lx.toFixed(1)}" y="0" width="${j531w.toFixed(1)}" height="${BH}" fill="#7c1a1a" stroke="#e94560" stroke-width="1"/>`;
  if (j531w > 14) svg += `<text x="${(lx+j531w/2).toFixed(1)}" y="${BH/2}" text-anchor="middle" fill="#e94560" font-size="7" font-weight="bold">조물림</text><text x="${(lx+j531w/2).toFixed(1)}" y="${BH/2+8}" text-anchor="middle" fill="#e94560" font-size="7">${Math.round(p.chuckLeft)}</text>`;
  lx += j531w;
  const jOw = Math.max((p.safetyLen + p.chuck2jaw) * sc, 1);
  svg += `<rect x="${lx.toFixed(1)}" y="0" width="${jOw.toFixed(1)}" height="${BH}" fill="#3d0c0c" stroke="#e94560" stroke-width="1"/>`;
  if (jOw > 18) svg += `<text x="${(lx+jOw/2).toFixed(1)}" y="${BH/2}" text-anchor="middle" fill="#e94560" font-size="7" font-weight="bold">조바깥</text><text x="${(lx+jOw/2).toFixed(1)}" y="${BH/2+8}" text-anchor="middle" fill="#e94560" font-size="7">${(p.safetyLen+p.chuck2jaw).toFixed(1)}</text>`;

  const dzX = (1 + (scrapVz + r.deadZone + p.residual) * sc).toFixed(1);
  svg += `<line x1="${dzX}" y1="0" x2="${dzX}" y2="${BH}" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>`;
  svg += `<text x="3" y="${BH-5}" fill="#e94560" font-size="8">척</text>`;
  svg += `<text x="${W-30}" y="${BH-5}" fill="#555" font-size="8">face</text>`;

  document.getElementById('animCanvas').innerHTML =
    `<svg width="${W}" height="${BH}" style="display:block;border-radius:6px;overflow:hidden;border:1px solid #333;background:#0d0d1a">${svg}</svg>`;

  const evs  = AN.segs.filter(s => s.step === cur && s.ev);
  const evTxt = evs.length ? evs[evs.length - 1].ev : (cur === 0 ? '재생 버튼을 눌러 시작' : '');
  const evEl  = document.getElementById('animEvent');
  evEl.textContent = evTxt;
  evEl.className   = 'anim-event' +
    (evTxt.includes('AL') || evTxt.includes('잔재') ? ' al' : '') +
    (evTxt.includes('완료') ? ' done' : '');

  const pct = AN.maxStep > 0 ? Math.round(cur / AN.maxStep * 100) : 0;
  document.getElementById('animProg').style.width = pct + '%';
  document.getElementById('animStep').textContent = `${cur} / ${AN.maxStep}`;
}

function animInit() {
  const p      = G.p || getP();
  const v102   = parseInt(document.getElementById('q102').value);
  const v101   = parseInt(document.getElementById('q101').value) || 0;
  const matLen = v102 + v101;
  const r      = calc(p, matLen);
  if (!r) return false;
  if (AN.tid) { clearInterval(AN.tid); AN.tid = null; }
  const built  = buildAnimSegs(p, matLen, r);
  AN.segs = built.segs; AN.maxStep = built.maxStep;
  AN.matLen = matLen; AN.p = p; AN.r = r; AN.cur = 0;
  return true;
}

function animPlay() {
  if (AN.tid) return;
  if (AN.cur === 0 || AN.cur >= AN.maxStep) { if (!animInit()) return; }
  const spd = parseInt(document.getElementById('animSpd').value);
  AN.tid = setInterval(() => {
    if (AN.cur >= AN.maxStep) { clearInterval(AN.tid); AN.tid = null; return; }
    AN.cur++; animDraw();
  }, spd);
}
function animPause() { if (AN.tid) { clearInterval(AN.tid); AN.tid = null; } }
function animReset() { animPause(); if (animInit()) animDraw(); }

/* ── 계산하기 ── */
function calculate() {
  const p = getP();
  const unitW    = p.finLen + p.tipWidth;
  const deadZone = p.chuckLeft + p.chuck2jaw + p.safetyLen;
  const pcsChuck = Math.floor((p.chuckInit - p.safetyLen) / unitW);
  const chuckOpt = pcsChuck * unitW + p.safetyLen;
  G = { p, unitW, deadZone, pcsChuck, chuckOpt };

  const matName = p.residual > 0 ? 'RS40' : ['','CN','RS40','CM'][p.matType] || '기타';
  document.getElementById('chuckInfo').innerHTML = `
    <div><div class="val">${pcsChuck}</div><div class="lbl">척당 개수</div></div>
    <div><div class="val">${chuckOpt}</div><div class="lbl">최적 척길이</div></div>
    <div><div class="val">${unitW}</div><div class="lbl">단위폭(mm)</div></div>
    <div><div class="val">${matName}</div><div class="lbl">소재</div></div>`;
  document.getElementById('tableTitle').textContent = `#102 기준 범위표 (${matName}, ${unitW}mm 피치)`;

  const tbody = document.getElementById('rangeBody');
  tbody.innerHTML = '';
  [0,100,200,300,400,500].forEach(v102 => {
    const hdr = document.createElement('tr');
    hdr.innerHTML = `<td colspan="5" style="background:#0f3460;color:#e94560;font-weight:bold;text-align:left;padding:10px">#102 = ${v102}</td>`;
    tbody.appendChild(hdr);

    let prevTotal = -1, groupStart = null, prevV101 = 0;
    let prevAuto = 0, prevRemain = 0, prevScrap = 0;
    const groups = [];

    for (let v101 = 0; v101 < 100; v101++) {
      const r = calc(p, v102 + v101);
      if (!r) continue;
      if (r.total !== prevTotal) {
        if (groupStart !== null) groups.push({ s: groupStart, e: prevV101, total: prevTotal, auto: prevAuto, remain: prevRemain, scrap: prevScrap });
        groupStart = v101; prevTotal = r.total;
      }
      prevV101 = v101; prevAuto = r.autoPulls; prevRemain = r.remainPcs; prevScrap = r.scrap;
    }
    if (groupStart !== null) groups.push({ s: groupStart, e: prevV101, total: prevTotal, auto: prevAuto, remain: prevRemain, scrap: prevScrap });

    groups.forEach(g => {
      const isAl = g.remain === 0 && g.auto > 0;
      const tr = document.createElement('tr');
      if (isAl) tr.classList.add('hl');
      tr.innerHTML = `
        <td>${v102+g.s}~${v102+g.e}mm<br><span style="color:#666;font-size:10px">#101=${g.s}~${g.e}</span></td>
        <td class="pcs">${g.total}</td>
        <td>${g.auto}</td>
        <td>${g.remain}</td>
        <td>${g.scrap.toFixed(1)}mm${isAl ? '<br><span class="al-match">AL 딱맞음</span>' : ''}</td>`;
      tbody.appendChild(tr);
    });
  });

  const dzVal = deadZone + p.residual;
  document.getElementById('dzInfo').innerHTML = `
    <b style="color:#aaa">조가 물고 있는 구간:</b><br>
    &nbsp; 스크랩 (자투리) + 최소물림 <b>#531: ${p.chuckLeft}mm</b><br><br>
    <b style="color:#aaa">조 바깥쪽 (물고 있지 않음):</b><br>
    &nbsp; 안전거리 <b>#530: ${p.safetyLen}mm</b><br>
    &nbsp; 척투조 <b>#532: ${p.chuck2jaw}mm</b><br>
    ${p.residual > 0 ? `<br>잔재안전 <b>#129: ${p.residual}mm</b> (RS40)<br>` : ''}
    <hr style="border-color:#333;margin:8px 0">
    <span class="total">데드존 합계: ${dzVal}mm</span><br><br>
    + 페이스컷 <b>#104: ${p.faceCut}mm</b> (첫 가공 단면)<br>
    + 마진 <b>#123: ${p.margin}mm</b> × AL 횟수<br>
    + 팁폭 <b>#114: ${p.tipWidth}mm</b> × (AL+잔재) 횟수`;

  quickCalc();
  switchTab('table');
}

function quickCalc() {
  const p      = getP();
  const v102   = parseInt(document.getElementById('q102').value);
  const v101   = parseInt(document.getElementById('q101').value) || 0;
  const matLen = v102 + v101;
  const r      = calc(p, matLen);
  const el     = document.getElementById('quickResult');

  if (!r) {
    el.innerHTML = `<div class="big">--</div><div class="detail">소재 길이 부족</div>`;
  } else {
    const matName = p.residual > 0 ? 'RS40' : ['','CN','RS40','CM'][p.matType] || '기타';
    el.innerHTML = `
      <div class="big">${r.total}개</div>
      <div class="detail">${matLen}mm (${matName}) | AL ${r.autoPulls}회 | 잔재 ${r.remainPcs}개 | 버림 ${r.scrap.toFixed(1)}mm</div>`;
  }

  if (document.getElementById('tab-viz').classList.contains('active')) renderViz();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-bar .btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const tabs = ['settings','table','deadzone','viz'];
  document.querySelectorAll('.tab-bar .btn')[tabs.indexOf(name)].classList.add('active');
  if (name === 'viz') { renderViz(); animReset(); }
}

window.onload = function () { calculate(); switchTab('settings'); };
</script>
