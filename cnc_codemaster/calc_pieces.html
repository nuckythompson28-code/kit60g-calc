<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KIT60G 생산개수 계산기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Malgun Gothic', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  padding: 12px;
  font-size: 14px;
  -webkit-text-size-adjust: none;
}
h1 {
  text-align: center;
  font-size: 18px;
  color: #00d4ff;
  margin-bottom: 12px;
  border-bottom: 1px solid #333;
  padding-bottom: 8px;
}
.input-section {
  background: #16213e;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
}
.input-section h2 {
  font-size: 14px;
  color: #00d4ff;
  margin-bottom: 10px;
}
.input-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}
.input-row label {
  flex: 1;
  font-size: 13px;
  color: #aaa;
}
.input-row input, .input-row select {
  width: 90px;
  padding: 8px;
  border: 1px solid #444;
  border-radius: 6px;
  background: #0f3460;
  color: #fff;
  font-size: 15px;
  text-align: center;
  -webkit-appearance: none;
}
.input-row select { width: 120px; }
.input-row .unit {
  font-size: 12px;
  color: #666;
  width: 30px;
}
button {
  width: 100%;
  padding: 14px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 12px;
}
button:active { background: #c73550; }
.result-box {
  background: #16213e;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
}
.result-box h2 {
  font-size: 14px;
  color: #00d4ff;
  margin-bottom: 8px;
}
.dead-zone {
  background: #1a1a2e;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.8;
}
.dead-zone .total {
  color: #e94560;
  font-weight: bold;

}
.chuck-info {
  display: flex;
  justify-content: space-around;
  background: #1a1a2e;
  border-radius: 8px;

  margin-bottom: 8px;
}
.chuck-info div { text-align: center; }
.chuck-info .val { font-size: 20px; font-weight: bold; color: #00d4ff; }
.chuck-info .lbl { font-size: 11px; color: #888; }
.range-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.range-table th {
  background: #0f3460;
  padding: 8px 4px;
  text-align: center;
  font-size: 11px;

}

}
.range-table tr:nth-child(even) { background: #1a1a2e; }

  align-items: center;

}
.quick-row input {
  width: 80px;
  padding: 10px;
  border: 2px solid #e94560;
  border-radius: 8px;
  background: #1a1a2e;
  color: #fff;
  font-size: 18px;

}

  background: #1a1a2e;
  border-radius: 8px;
  padding: 12px;

.quick-result .big { font-size: 36px; font-weight: bold; color: #e94560; }

.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}

  font-size: 12px;

}

/* ===== 애니메이션 ===== */
.anim-section {
  margin-top: 16px;
  border-top: 1px solid #333;
  padding-top: 14px;
}
.anim-event-box {
  background: #0a0a1a;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: bold;
  color: #00d4ff;
  min-height: 38px;
  display: flex;
  align-items: center;
  margin-bottom: 6px;

.anim-event-box.flash-al  { background: #2d1f00; border-color: #fdcb6e; color: #fdcb6e; }
.anim-event-box.flash-done { background: #001a10; border-color: #00b894; color: #00b894; }

  display: flex;
  align-items: center;
  margin: 6px 0 10px;
}
.anim-progress-bg {
  flex: 1;
  height: 6px;
  background: #333;
  border-radius: 3px;
  overflow: hidden;
}
.anim-progress-bar {
  height: 100%;
  background: #e94560;
  border-radius: 3px;
  width: 0%;
  transition: width 0.1s;
}
.anim-controls {
  display: flex;
  gap: 6px;
  align-items: center;
}
.anim-btn {
  flex: 1;
  padding: 10px 4px;
  font-size: 12px;
  background: #16213e;
  border-radius: 8px;

  width: auto;
}
.anim-btn:active { background: #0f3460; }
.anim-select {
  padding: 8px 6px;
  border: 1px solid #444;
  border-radius: 8px;

/* ===== 시각화 탭 ===== */
.viz-bar-wrap {
  background: #1a1a2e;
  border-radius: 8px;

}

}

  font-size: 13px;
  margin-top: 6px;
  line-height: 1.8;
  color: #aaa;
}
.viz-cycle-wrap {
  margin-top: 14px;
}
.viz-cycle-wrap h3 {
  font-size: 13px;
  color: #00d4ff;

  margin-bottom: 8px;
}

  font-size: 11px;
  color: #888;
  margin-bottom: 3px;
}
.cycle-label.remain { color: #0984e3; }

</head>
<body>

<h1>KIT60G 생산개수 계산기</h1>

<!-- 빠른 계산 -->
<div class="quick-calc">
  <h2>빠른 계산</h2>
  <div class="quick-row">
    <label style="color:#aaa">#102</label>
    <select id="q102" onchange="quickCalc()">
      <option value="0">0</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="300">300</option>
      <option value="400">400</option>
      <option value="500" selected>500</option>
    </select>
    <label style="color:#aaa">#101</label>
    <input type="number" id="q101" value="43" min="0" max="99" inputmode="numeric" onchange="quickCalc()" oninput="quickCalc()">
  </div>
  <div class="quick-result" id="quickResult">
    <div class="big">--</div>
    <div class="detail">위 값을 입력하세요</div>
  </div>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <button class="active" onclick="switchTab('settings')">설정</button>
  <button onclick="switchTab('table')">범위표</button>
  <button onclick="switchTab('deadzone')">데드존</button>
  <button onclick="switchTab('viz')">시각화</button>
</div>

<!-- 설정 탭 -->
<div id="tab-settings" class="tab-content active">
  <div class="input-section">
    <h2>제품 설정</h2>
    <div class="input-row">
      <label>완성 길이 (#113)</label>
      <input type="number" id="finLen" value="8.0" step="0.001" inputmode="decimal">
      <span class="unit">mm</span>
    </div>
    <div class="input-row">
      <label>팁 폭 (#114)</label>
      <input type="number" id="tipWidth" value="2.0" step="0.01" inputmode="decimal">
      <span class="unit">mm</span>
    </div>
    <div class="input-row">
      <label>소재 타입 (#105)</label>
      <select id="matType">
        <option value="1">1: CN</option>
        <option value="2">2: RS40</option>
        <option value="3" selected>3: CM</option>
      </select>
    </div>
  </div>

  <div class="input-section">
    <h2>장비 설정</h2>
    <div class="input-row">
      <label>척 길이 (#103)</label>
      <input type="number" id="chuckInit" value="75" step="1" inputmode="numeric">
      <span class="unit">mm</span>
    </div>
    <div class="input-row">
      <label>안전 거리 (#530)</label>
      <input type="number" id="safetyLen" value="12" step="1" inputmode="numeric">
      <span class="unit">mm</span>
    </div>
    <div class="input-row">
      <label>척 좌측 한계 (#531)</label>
      <input type="number" id="chuckLeft" value="15" step="1" inputmode="numeric">
      <span class="unit">mm</span>
    </div>
    <div class="input-row">
      <label>척투조 거리 (#532)</label>
      <input type="number" id="chuck2jaw" value="1.03" step="0.01" inputmode="decimal">
      <span class="unit">mm</span>
    </div>
    <div class="input-row">
      <label>페이스컷 (#104)</label>
      <input type="number" id="faceCut" value="1" step="0.1" inputmode="decimal">
      <span class="unit">mm</span>
    </div>
    <div class="input-row">
      <label>마진 (#123)</label>
      <input type="number" id="margin" value="0.2" step="0.1" inputmode="decimal">
      <span class="unit">mm</span>
    </div>
  </div>

  <button onclick="calculate()">계산하기</button>
</div>

<!-- 범위표 탭 -->
<div id="tab-table" class="tab-content">
  <div class="result-box">
    <h2 id="tableTitle">계산 결과</h2>
    <div class="chuck-info" id="chuckInfo"></div>
    <div style="overflow-x:auto">
      <table class="range-table" id="rangeTable">
        <thead><tr><th>소재길이</th><th>총개수</th><th>AL</th><th>잔재</th><th>버림</th></tr></thead>
        <tbody id="rangeBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 데드존 탭 -->
<div id="tab-deadzone" class="tab-content">
  <div class="result-box">
    <h2>못 쓰는 구간 (데드존)</h2>
    <div class="dead-zone" id="deadZoneInfo"></div>
  </div>
</div>

<!-- 시각화 탭 -->
<div id="tab-viz" class="tab-content">
  <div class="result-box">
    <h2 id="vizTitle">소재 배치 시각화</h2>

    <div class="viz-bar-wrap">
      <div id="vizBar"></div>
      <div class="viz-legend">
        <span><b style="background:#00b894"></b>제품(메인)</span>
        <span><b style="background:#0984e3"></b>잔재</span>
        <span><b style="background:#e17055"></b>파팅</span>
        <span><b style="background:#fdcb6e"></b>마진/구분</span>
        <span><b style="background:#6c5ce7"></b>페이스컷</span>
        <span><b style="background:#636e72"></b>구분자</span>
        <span><b style="background:#d63031"></b>스크랩</span>
        <span><b style="background:#2d3436;border:1px solid #555"></b>데드존</span>
      </div>
      <div class="viz-stats" id="vizStats"></div>
    </div>

    <div class="viz-cycle-wrap">
      <h3>사이클별 상세</h3>
      <div id="vizCycles"></div>
    </div>

    <!-- 애니메이션 -->
    <div class="anim-section">
      <h3 style="font-size:13px;color:#00d4ff;margin-bottom:10px">▶ 가공 애니메이션</h3>

      <div class="anim-event-box">
        <span id="animEvent">재생 버튼을 눌러 시작</span>
      </div>

      <div id="animCanvas" style="margin:8px 0"></div>

      <div class="anim-progress-wrap">
        <div class="anim-progress-bg">
          <div class="anim-progress-bar" id="animProgress"></div>
        </div>
        <span id="animStep" style="font-size:11px;color:#666;margin-left:6px">0/0</span>
      </div>

      <div class="anim-controls">
        <button class="anim-btn" onclick="animPlay()">▶ 재생</button>
        <button class="anim-btn" onclick="animPause()">⏸ 정지</button>
        <button class="anim-btn" onclick="animReset()">↺ 초기화</button>
        <select id="animSpeed" class="anim-select">
          <option value="400">느림</option>
          <option value="180" selected>보통</option>
          <option value="70">빠름</option>
          <option value="20">초고속</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script>
let G = {};

function getParams() {
  const matType = parseInt(document.getElementById('matType').value);
  return {
    finLen:    parseFloat(document.getElementById('finLen').value),
    tipWidth:  parseFloat(document.getElementById('tipWidth').value),
    chuckInit: parseFloat(document.getElementById('chuckInit').value),
    safetyLen: parseFloat(document.getElementById('safetyLen').value),
    chuckLeft: parseFloat(document.getElementById('chuckLeft').value),
    chuck2jaw: parseFloat(document.getElementById('chuck2jaw').value),
    faceCut:   parseFloat(document.getElementById('faceCut').value),
    margin:    parseFloat(document.getElementById('margin').value),
    residual:  (matType === 2) ? 15 : 0,
    matType:   matType
  };
}

function calcPieces(p, matLen) {
  const unitW   = p.finLen + p.tipWidth;
  const deadZone = p.chuckLeft + p.chuck2jaw + p.safetyLen;
  const pcsChuck = Math.floor((p.chuckInit - p.safetyLen) / unitW);
  const chuckOpt = pcsChuck * unitW + p.safetyLen;
  const machLen  = pcsChuck * unitW;
  const effMat   = matLen - p.residual;

  if (effMat <= chuckOpt) return null;

  let autoPulls = Math.floor(
    (effMat - p.chuckLeft - p.chuck2jaw - p.safetyLen - machLen - p.tipWidth - p.faceCut)
    / (machLen + p.tipWidth + p.margin)
  );
  if (autoPulls < 0) autoPulls = 0;

  const pcsMain   = pcsChuck * (1 + autoPulls);
  const consumed  = (machLen + p.tipWidth + p.faceCut) + autoPulls * (machLen + p.tipWidth + p.margin);
  const remainRaw = effMat - consumed - deadZone - (p.tipWidth + p.margin);
  const remainPcs = Math.max(0, Math.floor(remainRaw / unitW));
  const total     = pcsMain + remainPcs;

  let scrap;
  if (remainPcs > 0) {
    scrap = remainRaw - remainPcs * unitW;
  } else {
    scrap = Math.max(0, remainRaw);
  }

  return {
    total, autoPulls, remainPcs, scrap,
    pcsChuck, chuckOpt, machLen, unitW, deadZone
  };
}

/* ─────────────────────────────────────────────
   시각화
───────────────────────────────────────────── */
function renderViz() {
  const p = G.p || getParams();
  const v102  = parseInt(document.getElementById('q102').value);
  const v101  = parseInt(document.getElementById('q101').value) || 0;
  const matLen = v102 + v101;
  const r = calcPieces(p, matLen);

  const barEl    = document.getElementById('vizBar');
  const statsEl  = document.getElementById('vizStats');
  const cyclesEl = document.getElementById('vizCycles');
  document.getElementById('vizTitle').textContent =
    `소재 배치 시각화 — ${matLen}mm`;

  if (!r) {
    barEl.innerHTML = '<p style="color:#e94560;text-align:center;padding:16px">소재 길이 부족</p>';
    statsEl.innerHTML = '';
    cyclesEl.innerHTML = '';
    return;
  }

  const deadTotal = p.deadZone + p.residual;
  const W   = Math.max(barEl.clientWidth || 300, 200);
  const sc  = (W - 2) / matLen;   // px per mm
  const BH  = 48;

  /* 세그먼트 수집 */
  const segs = [];
  const push = (x, w, c, lbl) => { if (w > 0.01) segs.push({x, w, c, lbl: lbl || ''}); };

  /* ── 오른쪽(face)부터 계산 ── */
  let rp = matLen;

  // 페이스컷
  push(rp - p.faceCut, p.faceCut, '#6c5ce7', 'F');
  rp -= p.faceCut;

  // 초기 사이클 피스
  for (let j = 0; j < r.pcsChuck; j++) {
    push(rp - (j + 1) * r.unitW,              p.tipWidth, '#e17055', '');
    push(rp - (j + 1) * r.unitW + p.tipWidth, p.finLen,   '#00b894', '');
  }
  rp -= r.pcsChuck * r.unitW;

  // 초기 사이클 꼬리 구분자
  push(rp - p.tipWidth, p.tipWidth, '#636e72', '');
  rp -= p.tipWidth;

  // AL 사이클들
  for (let i = 0; i < r.autoPulls; i++) {
    push(rp - p.margin, p.margin, '#fdcb6e', '');
    rp -= p.margin;

    for (let j = 0; j < r.pcsChuck; j++) {
      push(rp - (j + 1) * r.unitW,              p.tipWidth, '#e17055', '');
      push(rp - (j + 1) * r.unitW + p.tipWidth, p.finLen,   '#00b894', '');
    }
    rp -= r.pcsChuck * r.unitW;

    push(rp - p.tipWidth, p.tipWidth, '#636e72', '');
    rp -= p.tipWidth;
  }

  /* ── 왼쪽(tail)부터 계산 ── */
  let lp = deadTotal;

  if (r.remainPcs > 0) {
    push(lp, p.tipWidth + p.margin, '#fdcb6e', '');
    lp += p.tipWidth + p.margin;

    // 잔재 피스 (왼쪽=꼬리 방향 순서로)
    for (let j = r.remainPcs - 1; j >= 0; j--) {
      push(lp,              p.tipWidth, '#e17055', '');
      push(lp + p.tipWidth, p.finLen,   '#0984e3', '');
      lp += r.unitW;
    }
  }

  // 스크랩
  if (rp > lp + 0.05) {
    push(lp, rp - lp, '#d63031', r.scrap > 3 ? '스크랩' : '');
  }

  // 데드존 (제일 마지막 → 위에 덮이도록)
  push(0, deadTotal, '#2d3436', deadTotal > 20 ? '데드존' : '');

  /* SVG 그리기 (face=왼쪽, tail/데드존=오른쪽) */
  segs.sort((a, b) => a.x - b.x);

  let svgInner = '';
  segs.forEach(s => {
    const px = (1 + s.x * sc).toFixed(1);
    const pw = Math.max(s.w * sc, 0.5).toFixed(1);
    svgInner += `<rect x="${px}" y="0" width="${pw}" height="${BH}" fill="${s.c}" stroke="#0a0a1a" stroke-width="0.2"/>`;
    if (parseFloat(pw) > 14 && s.lbl) {
      const fs = Math.min(9, parseFloat(pw) * 0.38);
      const cx = (parseFloat(px) + parseFloat(pw) / 2).toFixed(1);
      svgInner += `<text x="${cx}" y="${BH / 2 + 4}" text-anchor="middle" fill="#fff" font-size="${fs}" font-weight="bold">${s.lbl}</text>`;
    }
  });

  // 데드존 경계선 (왼쪽)
  const dzX = (1 + deadTotal * sc).toFixed(1);
  svgInner += `<line x1="${dzX}" y1="0" x2="${dzX}" y2="${BH}" stroke="#fff" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>`;

  // 척=왼쪽, face=오른쪽
  svgInner += `<text x="3" y="${BH - 5}" fill="#555" font-size="8">척</text>`;
  svgInner += `<text x="${W - 30}" y="${BH - 5}" fill="#555" font-size="8">face</text>`;

  barEl.innerHTML =
    `<svg width="${W}" height="${BH}" style="display:block;border-radius:6px;overflow:hidden;border:1px solid #333">${svgInner}</svg>
     <div style="display:flex;justify-content:space-between;font-size:10px;color:#555;margin:2px 0 0">
       <span>0</span><span>${matLen}mm</span>
     </div>`;

  /* 통계 */
  const matName = p.residual > 0 ? 'RS40' : ['', 'CN', 'RS40', 'CM'][p.matType];
  statsEl.innerHTML = `
    <div style="margin-top:4px">
      <b style="color:#00b894">제품 ${r.total - r.remainPcs}개</b> (메인) +
      <b style="color:#0984e3">${r.remainPcs}개</b> (잔재) =
      <b style="color:#fff">${r.total}개</b> 합계
    </div>
    <div style="font-size:12px;color:#888;margin-top:2px">
      오토링크 ${r.autoPulls}회 | 척당 ${r.pcsChuck}개 | 피치 ${r.unitW}mm |
      스크랩 ${r.scrap.toFixed(1)}mm | 데드존 ${deadTotal.toFixed(1)}mm
    </div>`;

  /* 사이클 상세 */
  const totalCycles = 1 + r.autoPulls;
  const CW    = W - 4;
  const slotW = CW / r.pcsChuck;
  const CH    = 20;

  let cycleHTML = '';

  for (let i = 0; i < totalCycles; i++) {
    const label   = i === 0 ? '초기 척킹' : `AL ${i}회차`;
    const pStart  = i * r.pcsChuck + 1;
    const pEnd    = (i + 1) * r.pcsChuck;

    let bars = '';
    for (let j = 0; j < r.pcsChuck; j++) {
      const bx  = (j * slotW + 1).toFixed(1);
      const pw  = Math.max((slotW * p.finLen / r.unitW) - 1, 1).toFixed(1);
      const ptw = Math.max(slotW * p.tipWidth / r.unitW - 0.5, 0.5).toFixed(1);
      const ptx = (parseFloat(bx) + parseFloat(pw) + 0.5).toFixed(1);
      bars += `<rect x="${bx}"  y="1" width="${pw}"  height="${CH - 2}" fill="#00b894" rx="2"/>`;
      bars += `<rect x="${ptx}" y="1" width="${ptw}" height="${CH - 2}" fill="#e17055" rx="1"/>`;
      if (parseFloat(pw) > 16) {
        const tx = (parseFloat(bx) + parseFloat(pw) / 2).toFixed(1);
        bars += `<text x="${tx}" y="${CH / 2 + 4}" text-anchor="middle" fill="#fff" font-size="8">${pStart + j}</text>`;
      }
    }

    cycleHTML += `
      <div class="cycle-row">
        <div class="cycle-label">${label} — #${pStart}~${pEnd} (${r.pcsChuck}개)</div>
        <svg width="${CW}" height="${CH}" style="display:block;background:#0a0a1a;border-radius:4px">${bars}</svg>
      </div>`;
  }

  if (r.remainPcs > 0) {
    const rStart = totalCycles * r.pcsChuck + 1;
    const rEnd   = totalCycles * r.pcsChuck + r.remainPcs;
    const rW     = Math.min(CW, Math.ceil(r.remainPcs * slotW + 2));

    let bars = '';
    for (let j = 0; j < r.remainPcs; j++) {
      const bx  = (j * slotW + 1).toFixed(1);
      const pw  = Math.max((slotW * p.finLen / r.unitW) - 1, 1).toFixed(1);
      const ptw = Math.max(slotW * p.tipWidth / r.unitW - 0.5, 0.5).toFixed(1);
      const ptx = (parseFloat(bx) + parseFloat(pw) + 0.5).toFixed(1);
      bars += `<rect x="${bx}"  y="1" width="${pw}"  height="${CH - 2}" fill="#0984e3" rx="2"/>`;
      bars += `<rect x="${ptx}" y="1" width="${ptw}" height="${CH - 2}" fill="#e17055" rx="1"/>`;
      if (parseFloat(pw) > 16) {
        const tx = (parseFloat(bx) + parseFloat(pw) / 2).toFixed(1);
        bars += `<text x="${tx}" y="${CH / 2 + 4}" text-anchor="middle" fill="#fff" font-size="8">${rStart + j}</text>`;
      }
    }

    cycleHTML += `
      <div class="cycle-row">
        <div class="cycle-label remain">잔재 인출 (O9003) — #${rStart}~${rEnd} (${r.remainPcs}개)</div>
        <svg width="${rW}" height="${CH}" style="display:block;background:#0a0a1a;border-radius:4px">${bars}</svg>
      </div>`;
  }

  if (!cycleHTML) cycleHTML = '<p style="color:#555;font-size:12px">사이클 없음</p>';
  cyclesEl.innerHTML = cycleHTML;
}

/* ─────────────────────────────────────────────
   애니메이션
───────────────────────────────────────────── */
let AN = { segs: [], maxStep: 0, current: 0, timerId: null, matLen: 0, p: null };

function buildAnimSegs(p, matLen, r) {
  const segs = [];
  const dead = p.deadZone + p.residual;
  let step = 0;

  const push = (x, w, c, ev, isEv) => segs.push({ step, x, w, c, event: ev || '', isEvent: !!isEv });

  // ── step 0: 배경 (항상 보임) ──
  // 전체 소재 바 (raw material)
  push(0, matLen, '#1e1e35', '');
  // 데드존
  push(0, dead, '#2d3436', '');

  // 스크랩 위치 미리 계산 → step 0에 어둡게 표시
  let rpFinal = matLen - p.faceCut - r.pcsChuck * r.unitW - p.tipWidth;
  for (let i = 0; i < r.autoPulls; i++) rpFinal -= p.margin + r.pcsChuck * r.unitW + p.tipWidth;
  let lpFinal = dead;
  if (r.remainPcs > 0) lpFinal += p.tipWidth + p.margin + r.remainPcs * r.unitW;
  if (rpFinal > lpFinal + 0.05) push(lpFinal, rpFinal - lpFinal, '#3a1515', '');

  // 페이스컷
  step = 1;
  let rp = matLen;
  push(rp - p.faceCut, p.faceCut, '#6c5ce7', '✂ 페이스컷');
  rp -= p.faceCut;

  // 초기 사이클
  for (let j = 0; j < r.pcsChuck; j++) {
    step++;
    const sl = rp - (j + 1) * r.unitW;
    push(sl,              p.tipWidth, '#e17055', `#${j + 1} 파팅`);
    push(sl + p.tipWidth, p.finLen,   '#00b894', `#${j + 1} 가공 완료 ✓`);
  }
  rp -= r.pcsChuck * r.unitW;

  step++;
  push(rp - p.tipWidth, p.tipWidth, '#636e72', 'AL 대기');
  rp -= p.tipWidth;

  // AL 사이클
  for (let i = 0; i < r.autoPulls; i++) {
    step++;
    push(0, 0, 'none', `🔄 AL ${i + 1}회 인출`, true);

    step++;
    push(rp - p.margin, p.margin, '#fdcb6e', `AL ${i + 1}회차 — 소재 이송`);
    rp -= p.margin;

    const offset = (i + 1) * r.pcsChuck;
    for (let j = 0; j < r.pcsChuck; j++) {
      step++;
      const pn = offset + j + 1;
      const sl = rp - (j + 1) * r.unitW;
      push(sl,              p.tipWidth, '#e17055', `#${pn} 파팅`);
      push(sl + p.tipWidth, p.finLen,   '#00b894', `#${pn} 가공 완료 ✓`);
    }
    rp -= r.pcsChuck * r.unitW;

    step++;
    push(rp - p.tipWidth, p.tipWidth, '#636e72', 'AL 대기');
    rp -= p.tipWidth;
  }

  // 잔재
  let lp = dead;
  if (r.remainPcs > 0) {
    step++;
    push(0, 0, 'none', '🔄 잔재 인출 (O9003)', true);

    step++;
    push(lp, p.tipWidth + p.margin, '#fdcb6e', '잔재 구분자');
    lp += p.tipWidth + p.margin;

    for (let j = r.remainPcs - 1; j >= 0; j--) {
      step++;
      const pn = (1 + r.autoPulls) * r.pcsChuck + (r.remainPcs - j);
      push(lp,              p.tipWidth, '#e17055', `잔재 #${pn} 파팅`);
      push(lp + p.tipWidth, p.finLen,   '#0984e3', `잔재 #${pn} 완료 ✓`);
      lp += r.unitW;
    }
  }

  // 스크랩 (step 0 배경 위에 확정색으로 덮기)
  if (rp > lp + 0.05) {
    step++;
    push(lp, rp - lp, '#d63031', `⚠ 스크랩 ${r.scrap.toFixed(1)}mm`);
  }

  // 완료 이벤트
  step++;
  push(0, 0, 'none', `✅ 가공 완료 — 총 ${r.total}개`, true);

  return { segs, maxStep: step };
}

function animDrawFrame() {
  const p      = AN.p;
  const matLen = AN.matLen;
  const cur    = AN.current;
  const W      = Math.max(document.getElementById('animCanvas').clientWidth || 300, 200);
  const sc     = (W - 2) / matLen;
  const BH     = 48;
  const dead   = p.deadZone + p.residual;

  const visible = AN.segs.filter(s => !s.isEvent && s.step <= cur && s.w > 0.01);

  let svg = '';
  visible.forEach(s => {
    const px  = (1 + s.x * sc).toFixed(1);
    const pw  = Math.max(s.w * sc, 0.5).toFixed(1);
    const isNew = s.step === cur;
    svg += `<rect x="${px}" y="0" width="${pw}" height="${BH}" fill="${s.c}"
      stroke="${isNew ? '#fff' : '#0a0a1a'}" stroke-width="${isNew ? 1.5 : 0.2}" opacity="${isNew ? 1 : 0.88}"/>`;
  });

  // 데드존 경계선 (왼쪽)
  const dzX = (1 + dead * sc).toFixed(1);
  svg += `<line x1="${dzX}" y1="0" x2="${dzX}" y2="${BH}" stroke="#fff" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.4"/>`;
  svg += `<text x="3" y="${BH - 5}" fill="#444" font-size="8">척</text>`;
  svg += `<text x="${W - 30}" y="${BH - 5}" fill="#444" font-size="8">face</text>`;

  document.getElementById('animCanvas').innerHTML =
    `<svg width="${W}" height="${BH}" style="display:block;border-radius:6px;overflow:hidden;border:1px solid #333;background:#0d0d1a">${svg}</svg>`;

  // 이벤트 텍스트
  const curEvs = AN.segs.filter(s => s.step === cur && s.event);
  const evText = curEvs.length ? curEvs[curEvs.length - 1].event : '';
  const evBox  = document.getElementById('animEvent');
  evBox.textContent = evText || (cur === 0 ? '재생 버튼을 눌러 시작' : '');
  evBox.className   = 'anim-event-box' +
    (evText.includes('AL') || evText.includes('잔재') ? ' flash-al' : '') +
    (evText.includes('완료') ? ' flash-done' : '');

  // 진행률
  const pct = AN.maxStep > 0 ? Math.round(cur / AN.maxStep * 100) : 0;
  document.getElementById('animProgress').style.width = pct + '%';
  document.getElementById('animStep').textContent     = `${cur} / ${AN.maxStep}`;
}

function animInit() {
  const p      = G.p || getParams();
  const v102   = parseInt(document.getElementById('q102').value);
  const v101   = parseInt(document.getElementById('q101').value) || 0;
  const matLen = v102 + v101;
  const r      = calcPieces(p, matLen);
  if (!r) return false;

  if (AN.timerId) { clearInterval(AN.timerId); AN.timerId = null; }
  const built = buildAnimSegs(p, matLen, r);
  AN.segs    = built.segs;
  AN.maxStep = built.maxStep;
  AN.matLen  = matLen;
  AN.p       = p;
  AN.current = 0;
  return true;
}

function animPlay() {
  if (AN.timerId) return;   // 이미 재생 중
  if (AN.current === 0 || AN.current >= AN.maxStep) {
    if (!animInit()) return;
  }
  const speed = parseInt(document.getElementById('animSpeed').value);
  AN.timerId = setInterval(() => {
    if (AN.current >= AN.maxStep) {
      clearInterval(AN.timerId);
      AN.timerId = null;
      return;
    }
    AN.current++;
    animDrawFrame();
  }, speed);
}

function animPause() {
  if (AN.timerId) { clearInterval(AN.timerId); AN.timerId = null; }
}

function animReset() {
  animPause();
  if (!animInit()) return;
  animDrawFrame();
}

/* ─────────────────────────────────────────────
   기존 로직
───────────────────────────────────────────── */
function calculate() {
  const p = getParams();
  const unitW    = p.finLen + p.tipWidth;
  const deadZone = p.chuckLeft + p.chuck2jaw + p.safetyLen;
  const pcsChuck = Math.floor((p.chuckInit - p.safetyLen) / unitW);
  const chuckOpt = pcsChuck * unitW + p.safetyLen;
  const effLen   = chuckOpt - p.safetyLen;

  G = { p, unitW, deadZone, pcsChuck, chuckOpt, effLen };

  const matName = p.residual > 0 ? 'RS40' : ['', 'CN', 'RS40', 'CM'][p.matType] || '기타';
  document.getElementById('chuckInfo').innerHTML = `
    <div><div class="val">${pcsChuck}</div><div class="lbl">척당 개수</div></div>
    <div><div class="val">${chuckOpt}</div><div class="lbl">최적 척길이</div></div>
    <div><div class="val">${unitW}</div><div class="lbl">단위폭(mm)</div></div>
    <div><div class="val">${matName}</div><div class="lbl">소재</div></div>
  `;
  document.getElementById('tableTitle').textContent =
    `#102 기준 범위표 (${matName}, ${unitW}mm 피치)`;

  const tbody = document.getElementById('rangeBody');
  tbody.innerHTML = '';

  [0, 100, 200, 300, 400, 500].forEach(v102 => {
    const hdr = document.createElement('tr');
    hdr.innerHTML = `<td colspan="5" style="background:#0f3460;color:#e94560;font-weight:bold;text-align:left;padding:10px">#102 = ${v102}</td>`;
    tbody.appendChild(hdr);

    let prevTotal = -1, groupStart = null, prevV101 = 0;
    let prevAuto = 0, prevRemain = 0, prevScrap = 0;
    const groups = [];

    for (let v101 = 0; v101 < 100; v101++) {
      const matLen = v102 + v101;
      const r = calcPieces(p, matLen);
      if (!r) continue;

      if (r.total !== prevTotal) {
        if (groupStart !== null)
          groups.push({ s: groupStart, e: prevV101, total: prevTotal, auto: prevAuto, remain: prevRemain, scrap: prevScrap });
        groupStart = v101;
        prevTotal  = r.total;
      }
      prevV101  = v101;
      prevAuto  = r.autoPulls;
      prevRemain = r.remainPcs;
      prevScrap  = r.scrap;
    }
    if (groupStart !== null)
      groups.push({ s: groupStart, e: prevV101, total: prevTotal, auto: prevAuto, remain: prevRemain, scrap: prevScrap });

    groups.forEach(g => {
      const isAlMatch = g.remain === 0 && g.auto > 0;
      const tr = document.createElement('tr');
      if (isAlMatch) tr.classList.add('highlight');
      tr.innerHTML = `
        <td>${v102 + g.s}~${v102 + g.e}mm<br><span style="color:#666;font-size:10px">#101=${g.s}~${g.e}</span></td>
        <td class="pcs">${g.total}</td>
        <td>${g.auto}</td>
        <td>${g.remain}</td>
        <td>${g.scrap.toFixed(1)}mm${isAlMatch ? '<br><span class="al-match">AL 딱맞음</span>' : ''}</td>
      `;
      tbody.appendChild(tr);
    });
  });

  const deadZoneVal = deadZone + p.residual;
  let dzHtml = `
    척 좌측 한계(#531): <b>${p.chuckLeft}mm</b><br>
    척~조 거리(#532): <b>${p.chuck2jaw}mm</b><br>
    안전 거리(#530): <b>${p.safetyLen}mm</b><br>
  `;
  if (p.residual > 0) dzHtml += `잔재 안전값(#129): <b>${p.residual}mm</b> ← RS40<br>`;
  dzHtml += `<hr style="border-color:#333;margin:8px 0">`;
  dzHtml += `<span class="total">합계: ${deadZoneVal}mm 못 씀</span><br><br>`;
  dzHtml += `+ 페이스컷(#104): ${p.faceCut}mm (첫 가공)<br>`;
  dzHtml += `+ 마진(#123): ${p.margin}mm (오토링크마다)<br>`;
  dzHtml += `+ 팁폭(#114): ${p.tipWidth}mm (잔재 인출 시)`;
  document.getElementById('deadZoneInfo').innerHTML = dzHtml;

  quickCalc();
  switchTab('table');
}

function quickCalc() {
  const p    = getParams();
  const v102 = parseInt(document.getElementById('q102').value);
  const v101 = parseInt(document.getElementById('q101').value) || 0;
  const matLen = v102 + v101;
  const r    = calcPieces(p, matLen);
  const el   = document.getElementById('quickResult');

  if (!r) {
    el.innerHTML = `<div class="big">--</div><div class="detail">소재 길이 부족 (최소 ${Math.ceil(p.chuckInit)}mm 이상)</div>`;
  } else {
    const matName = p.residual > 0 ? 'RS40' : ['', 'CN', 'RS40', 'CM'][p.matType] || '기타';
    el.innerHTML = `
      <div class="big">${r.total}개</div>
      <div class="detail">
        소재 ${matLen}mm (${matName}) | 오토링크 ${r.autoPulls}회 | 잔재 ${r.remainPcs}개 | 버림 ${r.scrap.toFixed(1)}mm
      </div>
    `;
  }

  // 시각화 탭이 열려있으면 갱신
  if (document.getElementById('tab-viz').classList.contains('active')) {
    renderViz();
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const tabs = ['settings', 'table', 'deadzone', 'viz'];
  document.querySelectorAll('.tab-bar button')[tabs.indexOf(name)].classList.add('active');
  if (name === 'viz') { renderViz(); animReset(); }
}

window.onload = function () {
  calculate();
  switchTab('settings');
};
</script>
